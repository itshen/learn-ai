<title>Agent 卡死的 5 种模式 | xueai.app</title>
<style>
:root{--bg:#f7f5f0;--text:#1c1c1e;--sub:#6b6b70;--border:rgba(0,0,0,.07);--surface:#fff;--surface2:#f0ede6;--orange:#ea580c;--green:#16a34a;--red:#dc2626;--cyan:#0891b2;--purple:#7c3aed;--muted:#8e8e93;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e5e2da;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;opacity:0;animation:si .15s ease .08s forwards;-webkit-font-smoothing:antialiased}
@keyframes si{to{opacity:1}}
.slide{width:94vw;max-width:1440px;aspect-ratio:16/9;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.hd{padding:12px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hd-tag{font-size:14px;font-weight:800;color:var(--orange)}
.hd-title{font-size:24px;font-weight:800;color:var(--text)}
.hd-title em{font-style:normal;color:var(--orange)}

.body{flex:1;display:grid;grid-template-columns:220px 1fr;min-height:0;overflow:hidden}

.sidebar{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.sb-label{padding:8px 14px;font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px;border-bottom:1px solid var(--border);flex-shrink:0}

.mode-card{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.mode-card:hover{background:var(--surface2)}
.mode-card.active{background:rgba(234,88,12,.05);border-left:3px solid var(--orange)}
.mode-card.active .mc-name{color:var(--orange)}
.mc-icon{font-size:20px;margin-bottom:4px}
.mc-name{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px;transition:color .15s}
.mc-brief{font-size:12px;color:var(--muted);line-height:1.4}
.mc-num{position:absolute;top:10px;right:12px;width:22px;height:22px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted)}
.mode-card.active .mc-num{background:rgba(234,88,12,.12);color:var(--orange)}

.main{display:flex;flex-direction:column;overflow:hidden}
.main-top{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.mt-scenario{font-size:14px;color:var(--text);font-weight:700}

.main-body{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;overflow:hidden}
.sim-col{display:flex;flex-direction:column;overflow:hidden}
.sim-col:first-child{border-right:1px solid var(--border)}
.sim-hd{padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:800;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sim-hd-fail{color:var(--red);background:rgba(220,38,38,.03)}
.sim-hd-fix{color:var(--green);background:rgba(22,163,74,.03)}
.sim-body{flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px}

.msg{border-radius:10px;padding:8px 12px;font-size:13px;line-height:1.6;opacity:0;transform:translateY(6px);transition:all .35s ease}
.msg.show{opacity:1;transform:translateY(0)}
.msg-role{font-size:10px;font-weight:800;letter-spacing:.4px;margin-bottom:3px;text-transform:uppercase}
.msg-text{white-space:pre-line}

.msg-user{background:rgba(8,145,178,.06);border:1px solid rgba(8,145,178,.12)}
.msg-user .msg-role{color:var(--cyan)}
.msg-model{background:rgba(124,58,237,.05);border:1px solid rgba(124,58,237,.1)}
.msg-model .msg-role{color:var(--purple)}
.msg-tool{background:rgba(22,163,74,.05);border:1px solid rgba(22,163,74,.12)}
.msg-tool .msg-role{color:var(--green)}
.msg-error{background:rgba(220,38,38,.06);border:1.5px solid rgba(220,38,38,.2)}
.msg-error .msg-role{color:var(--red)}
.msg-warning{background:rgba(215,119,6,.06);border:1.5px solid rgba(215,119,6,.2)}
.msg-warning .msg-role{color:var(--amber)}
.msg-loop{background:rgba(124,58,237,.03);border:1.5px dashed rgba(124,58,237,.2)}
.msg-loop .msg-role{color:var(--purple)}
.msg-ok{background:rgba(22,163,74,.06);border:1.5px solid rgba(22,163,74,.2)}
.msg-ok .msg-role{color:var(--green)}
.msg-framework{background:rgba(234,88,12,.05);border:1px dashed rgba(234,88,12,.2)}
.msg-framework .msg-role{color:var(--orange)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.shake{animation:shake .4s ease}
@keyframes pulse-border{0%,100%{border-color:rgba(220,38,38,.2)}50%{border-color:rgba(220,38,38,.5)}}
.pulse{animation:pulse-border 1.2s ease infinite}

.decision-bar{padding:8px 14px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dec{background:rgba(234,88,12,.06);border:1.5px solid rgba(234,88,12,.2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);line-height:1.55}
.dec b{color:var(--orange)}

.ctrl{padding:8px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;background:var(--surface)}
.btn{padding:6px 16px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-p{background:var(--orange);color:white}
.btn-p:hover{filter:brightness(1.1)}
.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-r{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}
.ctrl-hint{font-size:13px;color:var(--muted)}

.insight-bar{padding:8px 24px;border-top:1px solid var(--border);font-size:13px;color:var(--text);line-height:1.5;flex-shrink:0;display:flex;align-items:center;gap:8px}
.insight-bar b{color:var(--orange)}

.empty-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-size:14px}
.empty-state-icon{font-size:36px;opacity:.4}

.counter{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:700}
.counter-fail{background:rgba(220,38,38,.08);color:var(--red)}
.counter-fix{background:rgba(22,163,74,.08);color:var(--green)}
</style>

var activeMode = -1, playing = false, failStep = 0, fixStep = 0, timers = [];

function buildCards() {
  var html = '';
  for (var i = 0; i < MODES.length; i++) {
    var m = MODES[i];
    html += '<div class="mode-card' + (i === activeMode ? ' active' : '') + '" onclick="selectMode(' + i + ')" id="card' + i + '">' +
      '<div class="mc-num">' + (i + 1) + '</div>' +
      '<div class="mc-icon">' + m.icon + '</div>' +
      '<div class="mc-name">' + m.name + '</div>' +
      '<div class="mc-brief">' + m.brief + '</div>' +
      '</div>';
  }
  document.getElementById('cardList').innerHTML = html;
}

function selectMode(i) {
  clearTimers();
  playing = false;
  failStep = 0;
  fixStep = 0;
  activeMode = i;
  buildCards();
  renderMain();
}

function renderMain() {
  if (activeMode < 0) return;
  var m = MODES[activeMode];
  var mainEl = document.getElementById('mainArea');
  var es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';

  mainEl.innerHTML =
    '<div class="main-top">' +
      '<div class="mt-scenario"><span style="color:var(--orange);margin-right:6px">' + m.icon + '</span> ' + m.scenario + '</div>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<button class="btn btn-p" id="btnPlay" onclick="playAll()" style="padding:5px 14px;font-size:13px">▶ 播放模拟</button>' +
        '<button class="btn btn-r" onclick="resetSim()" style="padding:5px 12px;font-size:13px">重置</button>' +
      '</div>' +
    '</div>' +
    '<div class="main-body">' +
      '<div class="sim-col">' +
        '<div class="sim-hd sim-hd-fail">❌ 没有防护时 <span class="counter counter-fail" id="failCount">0 / ' + m.fail.length + '</span></div>' +
        '<div class="sim-body" id="failSim"></div>' +
      '</div>' +
      '<div class="sim-col">' +
        '<div class="sim-hd sim-hd-fix">✅ 加了防护后 <span class="counter counter-fix" id="fixCount">0 / ' + m.fix.length + '</span></div>' +
        '<div class="sim-body" id="fixSim"></div>' +
      '</div>' +
    '</div>' +
    '<div class="decision-bar">' +
      '<div class="dec">' + m.decision + '</div>' +
    '</div>';
}

function addMsg(containerId, step, callback) {
  var el = document.createElement('div');
  el.className = 'msg ' + step.type;
  el.innerHTML = '<div class="msg-role">' + step.role + '</div><div class="msg-text">' + step.text + '</div>';
  document.getElementById(containerId).appendChild(el);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      el.classList.add('show');
      if (step.shake) setTimeout(function() { el.classList.add('shake'); }, 100);
      if (step.pulse) setTimeout(function() { el.classList.add('pulse'); }, 300);
      el.parentElement.scrollTop = el.parentElement.scrollHeight;
      if (callback) callback();
    });
  });
}

function clearTimers() {
  for (var i = 0; i < timers.length; i++) clearTimeout(timers[i]);
  timers = [];
}

function playAll() {
  if (playing) return;
  playing = true;
  var m = MODES[activeMode];
  var btn = document.getElementById('btnPlay');
  if (btn) { btn.disabled = true; btn.textContent = '播放中…'; }

  var maxLen = Math.max(m.fail.length, m.fix.length);
  var step = 0;

  function tick() {
    if (step >= maxLen) {
      playing = false;
      if (btn) btn.textContent = '✓ 播放完成';
      return;
    }
    if (step < m.fail.length) {
      addMsg('failSim', m.fail[step]);
      failStep = step + 1;
      var fc = document.getElementById('failCount');
      if (fc) fc.textContent = failStep + ' / ' + m.fail.length;
    }
    if (step < m.fix.length) {
      addMsg('fixSim', m.fix[step]);
      fixStep = step + 1;
      var xc = document.getElementById('fixCount');
      if (xc) xc.textContent = fixStep + ' / ' + m.fix.length;
    }
    step++;
    timers.push(setTimeout(tick, 850));
  }
  tick();
}

function resetSim() {
  clearTimers();
  playing = false;
  failStep = 0;
  fixStep = 0;
  renderMain();
}

buildCards();
</script>
</body>
</html>
