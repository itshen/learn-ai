<style>
:root {
  --bg-color: #f7f5f0; /* 米白底色 */
  --text-main: #1c1c1e;
  --text-sub: #8e8e93;
  --accent: #0066ff;   /* 亮蓝色 */
  
  --tk-bg: transparent;
  --tk-border: transparent;
  --tk-pad: 0 1px;
  --tk-mar: 0;
  --tk-radius: 2px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #e5e2da; /* 更深的外部背景，衬托幻灯片 */
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  height: 100vh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}

.slide-container {
  width: 94vw; max-width: 1440px;
  aspect-ratio: 16 / 9;
  background-color: var(--bg-color);
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
}

/* ── Header ── */
.header {
  padding: 24px 40px;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0; z-index: 10;
  background-color: var(--bg-color);
}
.title-area h2 { font-size: 22px; font-weight: 600; color: var(--text-main); }
.title-area p { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

.controls button {
  background-color: var(--accent); color: white;
  border: none; padding: 10px 24px; border-radius: 30px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  box-shadow: 0 4px 12px rgba(0,102,255,0.25);
  transition: all 0.2s ease;
}
.controls button:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,102,255,0.35); }
.controls button:active { transform: translateY(0); }
.controls button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }

/* ── Main Layout ── */
.main-content {
  flex: 1; display: flex; position: relative; overflow: hidden;
}

.left-panel {
  width: 100%; height: 100%;
  padding: 40px 10%;
  overflow-y: auto;
  transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1), padding 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  display: flex; flex-direction: column; align-items: center;
}

/* ── Stage Transitions for Left Panel ── */
.corpus-wrapper {
  width: 100%; max-width: 900px;
  font-size: 26px; line-height: 1.8; color: var(--text-main);
  transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
}

.sentence { margin-bottom: 1.2em; transition: opacity 0.3s; }

.tk {
  display: inline-block;
  background: var(--tk-bg);
  border: 1px solid var(--tk-border);
  padding: var(--tk-pad);
  margin: var(--tk-mar);
  border-radius: var(--tk-radius);
  transition: all 0.4s ease;
  cursor: default;
}

/* Stage 1: Tokenized */
.stage-tokenized .left-panel { padding: 40px 5%; }
.stage-tokenized .corpus-wrapper { max-width: 1100px; font-size: 24px; }
.stage-tokenized {
  --tk-bg: #EBE8E0;
  --tk-border: #DCD8CE;
  --tk-pad: 4px 8px;
  --tk-mar: 4px 4px;
  --tk-radius: 6px;
}

/* Stage 2: Scanning — left panel shrinks, right panel (matrix) slides in */
.stage-scanning {
  --tk-bg: #EBE8E0;
  --tk-border: #DCD8CE;
  --tk-pad: 4px 8px;
  --tk-mar: 4px 4px;
  --tk-radius: 6px;
}
.stage-scanning .left-panel {
  width: 35%; padding: 30px;
  border-right: 1px solid rgba(0,0,0,0.06);
  align-items: flex-start;
}
.stage-scanning .corpus-wrapper { font-size: 15px; line-height: 2.0; max-width: 100%; }
.stage-scanning .right-panel { transform: translateX(0); opacity: 1; }

.tk.scan-active {
  background-color: var(--accent); color: white; border-color: var(--accent);
  transform: scale(1.1); z-index: 10; position: relative;
  box-shadow: 0 4px 16px rgba(0,102,255,0.4);
}
.tk.scan-ctx-strong { background-color: rgba(0,102,255,0.2); border-color: rgba(0,102,255,0.4); color: var(--accent); }
.tk.scan-ctx-weak { background-color: rgba(0,102,255,0.08); border-color: rgba(0,102,255,0.15); color: #333; }

/* Stage 3: Matrix */
.stage-matrix {
  --tk-bg: transparent;

}

/* Matrix Interaction Highlights */
.tk.mat-active {

  box-shadow: 0 2px 8px rgba(0,102,255,0.3);

/* ── Right Panel (Matrix) ── */
.right-panel {
  width: 65%; height: 100%;
  position: absolute; right: 0; top: 0;
  background-color: #FFFFFF;

.matrix-header {
  padding: 16px 30px; border-bottom: 1px solid rgba(0,0,0,0.04);

}
.matrix-header h3 { font-size: 15px; font-weight: 600; color: var(--text-main); margin: 0; }
.legend { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-sub); }
.legend-bar { width: 100px; height: 6px; border-radius: 3px; background: linear-gradient(to right, #F9FAFB, #BFDBFE, #3B82F6, #1E3A8A); }

  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 12px; overflow: hidden; position: relative;
  transition: height 0.3s ease;

  background: #FFF; cursor: crosshair;
}

/* ── Sampling Panel ── */
.sample-panel {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 12px 20px;
  display: none; flex-direction: column; 
  background: rgba(250,250,248,0.96);

  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;

}
.sample-word {
  font-size: 16px; font-weight: 700; color: var(--accent);

  margin-left: auto; background: var(--text-main); color: #fff;

  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.3px;
}

/* 左右两列布局 */
.sample-controls {
  display: flex; flex-direction: row; gap: 20px;

}

}

}
/* ── Custom Range Slider ── */
.sample-slider-row input[type=range] {

  background: rgba(0,0,0,0.08);

}

  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; border: 2px solid var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  cursor: pointer; transition: all 0.15s;
}

  transform: scale(1.15);
  box-shadow: 0 2px 8px rgba(0,102,255,0.3);
}

/* ── Tooltip ── */
.tooltip {
  position: fixed; pointer-events: none;
  background: rgba(28,28,30,0.9); color: white;
  padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  backdrop-filter: blur(8px);
  z-index: 1000; opacity: 0; transform: translate(-50%, -100%); margin-top: -12px;
  transition: opacity 0.2s; white-space: nowrap;
}
.tt-word { color: #60A5FA; font-weight: 600; }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

<style>@keyframes _si{from{opacity:0}to{opacity:1}}body{opacity:0;animation:_si 0.15s ease 0.08s forwards}</style></head>
<body>

<div class="slide-container" id="app">
  <div class="header">
    <div class="title-area">
      <h2 id="stage-title">1. 原始语料</h2>
      <p id="stage-desc">大模型学习的第一步：读取人类提供的海量文本数据。</p>
    </div>
    <div class="controls">
      <button id="next-btn" onclick="nextStage()">下一步：分词处理</button>
    </div>
  </div>

  <div class="main-content">
    <div class="left-panel" id="left-panel">
      <div class="corpus-wrapper" id="corpus-wrapper">
        <!-- Tokens injected here -->
      </div>
    </div>
    
    <div class="right-panel">
      <div class="matrix-header">
        <h3><span id="matrix-title">全局词间关联权重矩阵</span> (<span id="matrix-dim"></span>)</h3>
        <div class="legend">
          <span>关联弱</span>
          <div class="legend-bar"></div>
          <span>关联强</span>
        </div>
      </div>
      <div class="matrix-container" id="matrix-container">
        <canvas id="heatmap"></canvas>
      </div>

      <!-- Sampling Panel -->
      <div class="sample-panel" id="samplePanel">
        <div class="sample-top">
          <span class="sample-word" id="sampleWord">哥哥</span>
          <span class="sample-arrow">→</span>
          <span class="sample-result" id="sampleResult">?</span>
          <button class="sample-btn" onclick="doSample()">重新采样</button>
        </div>
        <div class="sample-controls">
          <div class="sample-slider-group">
            <div class="sample-slider-row">
              <label>Temperature</label>
              <input type="range" id="tempSlider" min="0" max="200" value="70" oninput="onParamChange()">
              <span class="val" id="tempVal">0.70</span>
            </div>
            <div class="sample-slider-row">
              <label>Top-P</label>
              <input type="range" id="toppSlider" min="1" max="100" value="90" oninput="onParamChange()">
              <span class="val" id="toppVal">0.90</span>
            </div>
          </div>
          <div class="sample-candidates" id="candList">
            <div class="sample-candidates-title">候选词概率分布</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Data Prep ──
const GA = window.GLOBAL_ATTN;
const vocab = GA.vocab;
const matrix = GA.matrix;
const n = vocab.length;
document.getElementById('matrix-dim').textContent = `${n}×${n}`;

const sentences = [
  '紫霞捧着月光宝盒，轻声问：哥哥，你说你喜欢我，可你从来不肯开口，我怎么知道你真的爱我？',
  '黛玉将花瓣撒入流水，抬眼问：宝玉哥哥，你说这花谢了还能再开吗？你走了，还回来吗？',
  '女儿国国王望着灯笼亮了又灭，喃喃道：御弟哥哥，你走了这么久，你可知道我只会等，只会心疼你？',
  '黄蓉转头对郭靖急道：靖哥哥你还站着干嘛，你真的舍得不回来，就这一次也好啊！',
  '小龙女轻声问杨过：过儿，你说执念这东西，真的能放下吗？还是说，你从来就不想放下？',
  '沈眉庄抚着杏花簪叹道：姐姐你看，这花开了又谢，哥哥走了，你说他还回来吗？',
  '白凤九抬头问东华帝君：哥哥，你懂我吗？还是你懂我，只是从来不肯说？',
  '花千骨跪在殿外，声音已哑：师父，你爱过我吗？还是说，你从来只会看我心疼，不肯留下？',
  '哥哥，你对我这么好，你女朋友不会生气吧。哥哥，你带我出去玩，你女朋友不会吃醋吧。',
  '哥哥，你还给我吃糖，你女朋友不会揍我吧？好可怕啊你女朋友，不像我，我只会心疼哥哥。',
];

// Tokenize text based on vocab
function tokenize(text) {
  const res = [];
  let i = 0;
  while(i < text.length) {
    let best = null, bestLen = 0;
    for(let len = Math.min(5, text.length - i); len >= 1; len--) {
      const sub = text.substring(i, i + len);
      const idx = vocab.indexOf(sub);
      if(idx >= 0 && len > bestLen) { best = { text: sub, vId: idx }; bestLen = len; }
    }
    if(best) { res.push(best); i += bestLen; }
    else { res.push({ text: text[i], vId: -1 }); i++; }
  }
  return res;
}

const parsedSentences = sentences.map(s => tokenize(s));

// Build next-token frequency table: nextFreq[vId] = Map<nextVId, count>
const nextFreq = Array.from({length: n}, () => new Map());
for (const toks of parsedSentences) {
  for (let i = 0; i < toks.length - 1; i++) {
    const cur = toks[i].vId;
    const nxt = toks[i + 1].vId;
    if (cur >= 0 && nxt >= 0) {
      nextFreq[cur].set(nxt, (nextFreq[cur].get(nxt) || 0) + 1);
    }
  }
}

const allTokens = []; // flat list for animation

// Render DOM
const wrapper = document.getElementById('corpus-wrapper');
parsedSentences.forEach((toks, sId) => {
  const p = document.createElement('div');
  p.className = 'sentence';
  toks.forEach((t, tId) => {
    const span = document.createElement('span');
    span.className = 'tk';
    span.textContent = t.text;
    span.dataset.vid = t.vId;
    span.dataset.sid = sId;
    span.dataset.tid = tId;
    
    if(t.vId >= 0) {
      span.onclick = () => handleTokenClick(t.vId);
    }
    
    p.appendChild(span);
    allTokens.push({ el: span, vId: t.vId, sId });
  });
  wrapper.appendChild(p);
});

// ── State Machine ──
let currentStage = 0;
const app = document.getElementById('app');
const titleEl = document.getElementById('stage-title');
const descEl = document.getElementById('stage-desc');
const btn = document.getElementById('next-btn');

const stages = [
  { class: '', title: '1. 原始语料', desc: '大模型学习的第一步：读取人类提供的海量文本数据。', btnText: '下一步：文本分词' },
  { class: 'stage-tokenized', title: '2. 文本分词 (Tokenization)', desc: '将连续文本切分成模型能理解的基本单元 (Token)。', btnText: '下一步：计算注意力' },
  { class: 'stage-scanning', title: '3. 注意力计算 (Self-Attention)', desc: '模型扫描每个 Token，计算它与上下文中其他 Token 的关联权重。', btnText: '跳过动画' },
  { class: 'stage-matrix', title: '4. 全局关联矩阵', desc: '训练完成！点击任意词汇查看关联关系，调节 Temperature 和 Top-P 观察采样变化。', btnText: '重新播放' }
];

function nextStage() {
  currentStage++;
  if(currentStage > 3) currentStage = 0;
  
  app.className = 'slide-container ' + stages[currentStage].class;
  titleEl.textContent = stages[currentStage].title;
  descEl.textContent = stages[currentStage].desc;
  btn.textContent = stages[currentStage].btnText;
  
  if(currentStage === 0) {
    // Reset everything on replay
    stopScanningAnimation();
    revealedRows.clear();
    scanHighlightRow = -1;
    activeVId = -1;
    showSamplePanel(-1);
    clearAllHighlights();
  } else if(currentStage === 2) {
    startScanningAnimation();
  } else if(currentStage === 3) {
    stopScanningAnimation();
    for(let v=0; v<n; v++) revealedRows.add(v);
    document.getElementById('matrix-title').textContent = '全局词间关联权重矩阵';
    document.getElementById('matrix-dim').textContent = `${n}×${n}`;
    updateMatrixContainerHeight();
    drawMatrix(-1);
  } else {
    stopScanningAnimation();
    clearAllHighlights();
  }
}

// ── Scanning Animation ──
let scanAnimId = null;
function startScanningAnimation() {
  clearAllHighlights();
  revealedRows.clear();
  scanHighlightRow = -1;
  btn.disabled = false;
  
  // Draw the empty matrix grid first
  requestAnimationFrame(() => drawMatrix(-1));
  
  let idx = 0;
  let needsMatrixRedraw = false;
  
  function tick() {
    if(currentStage !== 2) return;
    
    for(let f=0; f<3; f++) {
      if(idx >= allTokens.length) {
        for(let v=0; v<n; v++) revealedRows.add(v);
        scanHighlightRow = -1;
        drawMatrix(-1);
        nextStage(); // advance to stage 3
        return;
      }
      
      const prev = document.querySelector('.scan-active');
      if(prev) prev.classList.remove('scan-active');
      document.querySelectorAll('.scan-ctx-strong, .scan-ctx-weak').forEach(el => el.classList.remove('scan-ctx-strong', 'scan-ctx-weak'));
      
      const current = allTokens[idx];
      current.el.classList.add('scan-active');
      
      if(current.vId >= 0) {
        // Mark this vocab row as revealed in the matrix
        if(!revealedRows.has(current.vId)) {
          revealedRows.add(current.vId);
          needsMatrixRedraw = true;
        }
        scanHighlightRow = current.vId;
        
        allTokens.forEach(t => {
          if(t.sId === current.sId && t !== current && t.vId >= 0) {
            const w = matrix[current.vId][t.vId];
            if(w > 0.05) t.el.classList.add('scan-ctx-strong');
            else if(w > 0.01) t.el.classList.add('scan-ctx-weak');
          }
        });
      }
      
      document.querySelectorAll('.sentence').forEach((sent, sId) => {
        if(sId !== current.sId) sent.style.opacity = '0.3';
        else sent.style.opacity = '1';
      });
      
      if(f === 0) {
        current.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      
      idx++;
    }
    
    // Update matrix progress and redraw
    const pct = Math.round(revealedRows.size / n * 100);
    document.getElementById('matrix-title').textContent = `学习中… 已掌握 ${revealedRows.size}/${n} 个词`;
    document.getElementById('matrix-dim').textContent = `${pct}%`;
    drawMatrix(-1);
    
    scanAnimId = setTimeout(tick, 100);
  }
  tick();
}

function stopScanningAnimation() {
  clearTimeout(scanAnimId);
  scanHighlightRow = -1;
  document.querySelectorAll('.sentence').forEach(sent => sent.style.opacity = '1');
  clearAllHighlights();
}

function clearAllHighlights() {
  document.querySelectorAll('.tk').forEach(el => {
    el.className = 'tk';
  });
}

// ── Matrix Rendering ──
const canvas = document.getElementById('heatmap');
const ctx = canvas.getContext('2d');
let activeVId = -1;

// Progressive fill tracking: which vocab rows have been "learned"
const revealedRows = new Set();
let scanHighlightRow = -1; // currently scanning row, for glow effect

function getHeatColor(val, isHighlighted, isAnyHighlighted) {
  if(val <= 0.001) return isAnyHighlighted && !isHighlighted ? '#F9FAFB' : '#F3F4F6';
  const norm = Math.pow(val, 0.4);
  let r, g, b;
  if(norm < 0.3) {
    const p = norm / 0.3;
    r = 249 + (191-249)*p; g = 250 + (219-250)*p; b = 251 + (254-251)*p;
  } else if(norm < 0.7) {
    const p = (norm - 0.3) / 0.4;
    r = 191 + (59-191)*p; g = 219 + (130-219)*p; b = 254 + (246-254)*p;
  } else {
    const p = (norm - 0.7) / 0.3;
    r = 59 + (30-59)*p; g = 130 + (58-130)*p; b = 246 + (138-246)*p;
  }
  if(isAnyHighlighted && !isHighlighted) {
    r = 245 + (r-245)*0.2; g = 245 + (g-245)*0.2; b = 245 + (b-245)*0.2;
  }
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

function drawMatrix(hlId) {
  if(currentStage < 2) return;
  const container = document.getElementById('matrix-container');
  const size = Math.min(container.clientWidth, container.clientHeight) - 20;
  if(size <= 0) return;
  const cell = size / n;
  
  const dpr = window.devicePixelRatio || 1;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  let maxW = 0;
  for(let i=0;i<n;i++) for(let j=0;j<n;j++) if(i!==j && matrix[i][j]>maxW) maxW = matrix[i][j];
  if(maxW===0) maxW=1;

  const isScanning = currentStage === 2;
  const isComplete = currentStage === 3;

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, size, size);

  for(let i=0; i<n; i++) {
    // During scanning, only show revealed rows; in stage 3 show all
    const rowVisible = isComplete || revealedRows.has(i);
    
    for(let j=0; j<n; j++) {
      const colVisible = isComplete || revealedRows.has(j);
      const cellRevealed = rowVisible || colVisible;
      
      const isHl = hlId >= 0 && (i === hlId || j === hlId);
      const isAnyHl = hlId >= 0;
      
      if(!cellRevealed) {
        // Unrevealed: very faint grid
        ctx.fillStyle = '#F9FAFB';
      } else if(i === j) {
        ctx.fillStyle = isAnyHl && !isHl ? '#F3F4F6' : '#DBEAFE';
      } else {
        const val = matrix[i][j] / maxW;
        ctx.fillStyle = getHeatColor(val, isHl, isAnyHl);
      }
      
      const gap = cell > 4 ? 0.5 : 0;
      ctx.fillRect(j*cell + gap, i*cell + gap, cell - gap*2, cell - gap*2);
    }
  }
  
  // During scanning: highlight the currently-being-scanned row
  if(isScanning && scanHighlightRow >= 0) {
    ctx.fillStyle = 'rgba(0,102,255,0.15)';
    ctx.fillRect(0, scanHighlightRow*cell, size, cell);
    ctx.fillRect(scanHighlightRow*cell, 0, cell, size);
    // Bright dot on diagonal
    ctx.fillStyle = 'rgba(0,102,255,0.6)';
    ctx.fillRect(scanHighlightRow*cell, scanHighlightRow*cell, cell, cell);
  }
  
  // Stage 3: interactive highlight axis markers
  if(isComplete && hlId >= 0) {
    ctx.fillStyle = 'rgba(0,102,255,0.1)';
    ctx.fillRect(0, hlId*cell, size, cell);
    ctx.fillRect(hlId*cell, 0, cell, size);
    ctx.fillStyle = '#0066FF';
    ctx.fillRect(hlId*cell, hlId*cell, cell, cell);
  }
}

// ── Interaction ──
function handleTokenClick(vId) {
  if(currentStage !== 3) return;
  activeVId = (activeVId === vId) ? -1 : vId;
  updateHighlights();
}

canvas.addEventListener('click', (e) => {
  if(currentStage !== 3) return;
  const rect = canvas.getBoundingClientRect();
  const size = rect.width;
  const cell = size / n;
  const col = Math.floor((e.clientX - rect.left) / cell);
  const row = Math.floor((e.clientY - rect.top) / cell);
  
  let picked = -1;
  if (row >= 0 && row < n) picked = row;
  else if (col >= 0 && col < n) picked = col;
  
  if(picked >= 0) {
    activeVId = (activeVId === picked) ? -1 : picked;
    updateHighlights();
  }
});

function updateHighlights() {
  drawMatrix(activeVId);
  clearAllHighlights();
  showSamplePanel(activeVId);
  
  if(activeVId >= 0) {
    const weights = matrix[activeVId];
    let maxW = 0;
    for(let k=0; k<n; k++) if(k!==activeVId && weights[k]>maxW) maxW = weights[k];
    
    allTokens.forEach(t => {
      if(t.vId < 0) { t.el.classList.add('mat-dim'); return; }
      
      if(t.vId === activeVId) {
        t.el.classList.add('mat-active');
      } else {
        const w = weights[t.vId];
        if(w >= maxW * 0.25) t.el.classList.add('mat-rel-strong');
        else if(w >= maxW * 0.05) t.el.classList.add('mat-rel-weak');
        else t.el.classList.add('mat-dim');
      }
    });
    
  }
}

// ── Tooltip ──
const tip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', (e) => {
  if(currentStage !== 3) return;
  const rect = canvas.getBoundingClientRect();
  const cell = rect.width / n;
  const col = Math.floor((e.clientX - rect.left) / cell);
  const row = Math.floor((e.clientY - rect.top) / cell);
  
  if(row >= 0 && row < n && col >= 0 && col < n) {
    const val = matrix[row][col];
    tip.innerHTML = `<span class="tt-word">${vocab[row]}</span> 关注 <span class="tt-word">${vocab[col]}</span>：${(val*100).toFixed(1)}%`;
    tip.style.display = 'block';
    tip.style.left = e.clientX + 'px';
    tip.style.top = (e.clientY - 15) + 'px';
    tip.style.opacity = '1';
  } else {
    tip.style.opacity = '0';
  }
});
canvas.addEventListener('mouseleave', () => { tip.style.opacity = '0'; });

// ── Sampling Panel Logic ──
const samplePanel = document.getElementById('samplePanel');
const sampleWordEl = document.getElementById('sampleWord');
const sampleResultEl = document.getElementById('sampleResult');
const tempSlider = document.getElementById('tempSlider');
const toppSlider = document.getElementById('toppSlider');
const tempValEl = document.getElementById('tempVal');
const toppValEl = document.getElementById('toppVal');
const candListEl = document.getElementById('candList');

function getTemp() { return tempSlider.value / 100; }
function getTopP() { return toppSlider.value / 100; }

function softmax(logits, temperature) {
  const t = Math.max(temperature, 0.01);
  const scaled = logits.map(l => l / t);
  const maxS = Math.max(...scaled);
  const exps = scaled.map(s => Math.exp(s - maxS));
  const sum = exps.reduce((a, b) => a + b, 0);
  return exps.map(e => e / sum);
}

function topPFilter(probs, topP) {
  const indexed = probs.map((p, i) => ({ p, i }));
  indexed.sort((a, b) => b.p - a.p);
  let cumul = 0;
  const kept = [];
  for (const item of indexed) {
    if (cumul >= topP && kept.length > 0) break;
    kept.push(item);
    cumul += item.p;
  }
  const keptSum = kept.reduce((a, b) => a + b.p, 0);
  kept.forEach(k => k.p = k.p / keptSum);
  return { kept, cutoffIdx: kept.length };
}

function sampleFrom(kept) {
  let r = Math.random();
  for (const item of kept) {
    r -= item.p;
    if (r <= 0) return item;
  }
  return kept[kept.length - 1];
}

let lastCandData = null;

function computeCandidates(vId) {
  if (vId < 0) return null;
  
  const freq = nextFreq[vId];
  const weights = matrix[vId];
  
  // Two-tier candidate system:
  // Tier 1: tokens that actually follow this token in corpus (high base score)
  // Tier 2: other tokens with matrix weight (low base score, for diversity)
  const candidates = [];
  const hasFreq = freq && freq.size > 0;
  
  for (let j = 0; j < n; j++) {
    if (j === vId) continue;
    const w = weights[j];
    const isNextInCorpus = hasFreq && freq.has(j);
    const count = isNextInCorpus ? freq.get(j) : 0;
    
    if (isNextInCorpus) {
      // Corpus next-token: strong base + frequency + matrix weight
      const logit = 3.0 + Math.log(count + 1) * 2 + (w || 0) * 2;
      candidates.push({ i: j, logit, word: vocab[j] });
    } else if (w > 0.01) {
      // Matrix-only: much weaker, serves as long-tail diversity
      const logit = Math.log(w + 1e-10);
      candidates.push({ i: j, logit, word: vocab[j] });
    }
  }
  
  if (candidates.length === 0) return null;
  
  const temperature = getTemp();
  const t = Math.max(temperature, 0.01);
  const scaled = candidates.map(c => c.logit / t);
  const maxS = Math.max(...scaled);
  const exps = scaled.map(s => Math.exp(s - maxS));
  const sum = exps.reduce((a, b) => a + b, 0);
  candidates.forEach((c, idx) => { c.p = exps[idx] / sum; });
  
  candidates.sort((a, b) => b.p - a.p);
  const top10 = candidates.slice(0, 10);
  
  // Apply Top-P filtering for sampling
  const topP = getTopP();
  let cumul = 0;
  const kept = [];
  for (const item of candidates) {
    if (cumul >= topP && kept.length > 0) break;
    kept.push({ ...item });
    cumul += item.p;
  }
  const keptSum = kept.reduce((a, b) => a + b.p, 0);
  kept.forEach(k => k.p = k.p / keptSum);
  
  const keptIndices = new Set(kept.map(k => k.i));
  return { top10, kept, keptIndices };
}

function renderCandidates() {
  if (!lastCandData) return;
  const { top10, kept, keptIndices } = lastCandData;

  const titleEl = candListEl.querySelector('.sample-candidates-title');
  candListEl.innerHTML = '';
  candListEl.appendChild(titleEl);
  
  const maxP = top10[0] ? top10[0].p : 1;
  top10.forEach(item => {
    const row = document.createElement('div');
    row.className = 'cand-row';
    if (!keptIndices.has(item.i)) row.classList.add('cutoff');
    
    const wEl = document.createElement('span');
    wEl.className = 'cand-word';
    wEl.textContent = item.word;
    
    const barBg = document.createElement('div');
    barBg.className = 'cand-bar-bg';
    const bar = document.createElement('div');
    bar.className = 'cand-bar';
    const pct = item.p / maxP * 100;
    bar.style.width = pct + '%';
    const ratio = item.p / maxP;
    const hue = keptIndices.has(item.i)
      ? `rgba(59, 130, 246, ${0.35 + ratio * 0.65})`
      : 'rgba(0,0,0,0.08)';
    bar.style.background = hue;
    barBg.appendChild(bar);
    
    const pctEl = document.createElement('span');
    pctEl.className = 'cand-pct';
    pctEl.textContent = (item.p * 100).toFixed(1) + '%';
    
    row.appendChild(wEl);
    row.appendChild(barBg);
    row.appendChild(pctEl);
    candListEl.appendChild(row);
  });
}

function refreshCandidates() {
  if (activeVId < 0) return;
  lastCandData = computeCandidates(activeVId);
  if (!lastCandData) return;
  renderCandidates();
}

function doSample() {
  if (!lastCandData || !lastCandData.kept || lastCandData.kept.length === 0) return;
  
  const picked = sampleFrom(lastCandData.kept);
  if (!picked) return;
  
  sampleResultEl.textContent = picked.word;
  sampleResultEl.style.transform = 'scale(1.15)';
  setTimeout(() => sampleResultEl.style.transform = 'scale(1)', 200);
  
  const rows = candListEl.querySelectorAll('.cand-row');
  rows.forEach(r => r.classList.remove('picked'));
  rows.forEach(r => {
    if (r.querySelector('.cand-word').textContent === picked.word) {
      r.classList.add('picked');
    }
  });
}

function onParamChange() {
  tempValEl.textContent = getTemp().toFixed(2);
  toppValEl.textContent = getTopP().toFixed(2);
  refreshCandidates();
  doSample();
}

const matrixContainer = document.getElementById('matrix-container');

function updateMatrixContainerHeight() {
  const panelVisible = samplePanel.classList.contains('show');
  const panelH = panelVisible ? 168 : 0;
  const rightPanel = matrixContainer.closest('.right-panel');
  const headerH = rightPanel.querySelector('.matrix-header').offsetHeight;
  const totalH = rightPanel.offsetHeight;
  const availH = totalH - headerH - panelH;
  matrixContainer.style.height = availH + 'px';
  matrixContainer.style.flex = 'none';
}

function showSamplePanel(vId) {
  if (vId < 0) {
    samplePanel.classList.remove('show');
    updateMatrixContainerHeight();
    setTimeout(() => drawMatrix(activeVId), 50);
    return;
  }
  const data = computeCandidates(vId);
  if (!data) {
    samplePanel.classList.remove('show');
    updateMatrixContainerHeight();
    setTimeout(() => drawMatrix(activeVId), 50);
    return;
  }
  lastCandData = data;
  samplePanel.classList.add('show');
  updateMatrixContainerHeight();
  sampleWordEl.textContent = vocab[vId];
  sampleResultEl.textContent = '?';
  renderCandidates();
  doSample();
  setTimeout(() => drawMatrix(activeVId), 50);
}

// Handle resize
window.addEventListener('resize', () => {
  updateMatrixContainerHeight();
  if(currentStage === 2) drawMatrix(-1);
  else if(currentStage === 3) drawMatrix(activeVId);
});
</script>
