<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>输出层优化 + KV Cache 进阶：成本优化的最后一公里 | xueai.app</title>
<style>
:root{--bg:#f7f5f0;--text:#1c1c1e;--sub:#6b6b70;--border:rgba(0,0,0,0.07);--surface:white;--surface2:#f0ede6;--red:#dc2626;--green:#16a34a;--orange:#ea580c;--cyan:#0891b2;--purple:#5b4fcf;--accent:#0066ff;--muted:#8e8e93;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e5e2da;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadein .15s ease .08s forwards;-webkit-font-smoothing:antialiased}
@keyframes fadein{to{opacity:1}}
.slide{width:94vw;max-width:1440px;aspect-ratio:16/9;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.08);display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hd{padding:16px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hd-tag{font-size:14px;font-weight:800;color:var(--red)}
.hd-title{font-size:24px;font-weight:800;color:var(--text)}
.hd-title em{font-style:normal;color:var(--green)}
.hd-sub{font-size:14px;color:var(--muted)}

/* Body split */
.body{flex:1;display:grid;grid-template-columns:380px 1fr;min-height:0}

/* ── Left: nav ── */
.nav-col{padding:20px 22px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:6px;overflow-y:auto}
.nav-group{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;padding:4px 2px 2px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;border:1.5px solid transparent;background:var(--surface);cursor:pointer;transition:all .2s;font-family:inherit;width:100%;text-align:left}
.nav-item:hover{border-color:rgba(0,0,0,0.1);background:#fafaf8}
.nav-item.active{border-color:var(--accent);background:rgba(0,102,255,.04);box-shadow:0 2px 10px rgba(0,102,255,.1)}
.nav-badge{padding:3px 9px;border-radius:6px;font-size:12px;font-weight:800;flex-shrink:0}
.badge-out{background:rgba(8,145,178,.12);color:var(--cyan)}
.badge-kv{background:rgba(91,79,207,.12);color:var(--purple)}
.nav-text h5{font-size:16px;font-weight:700;color:var(--text);line-height:1.3}
.nav-text p{font-size:13px;color:var(--sub);margin-top:1px}
.nav-save{margin-left:auto;font-size:15px;font-weight:900;flex-shrink:0;white-space:nowrap}

/* ── Right: demo ── */
.demo-col{padding:24px 30px;display:flex;flex-direction:column;gap:16px;overflow:hidden}
.demo-heading{flex-shrink:0}
.demo-heading h3{font-size:22px;font-weight:800;color:var(--text)}
.demo-heading p{font-size:16px;color:var(--sub);margin-top:4px;line-height:1.6}
.demo-body{flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden}

/* 通用卡片 */
.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:18px 20px}
.card-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}

/* Token 流动区 */
.token-stream{display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:52px}
.tok{padding:9px 14px;border-radius:10px;font-size:16px;font-weight:700;font-family:'SF Mono',Menlo,monospace;transition:all .35s ease}
.tok-ctx{background:rgba(0,102,255,.08);color:var(--accent);border:1px solid rgba(0,102,255,.2)}
.tok-bad{background:rgba(220,38,38,.08);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.tok-good{background:rgba(22,163,74,.08);color:var(--green);border:1px solid rgba(22,163,74,.2);opacity:0;transform:translateY(6px)}
.tok-good.show{opacity:1;transform:translateY(0)}
.tok-stop{background:rgba(220,38,38,.15);color:var(--red);border:2px dashed rgba(220,38,38,.4);font-size:13px;padding:9px 10px}
.tok-blocked{opacity:.2;text-decoration:line-through;filter:grayscale(1)}
.tok-arrow{font-size:18px;color:#ccc}

/* 概率条 */
.prob-list{display:flex;flex-direction:column;gap:6px}
.prob-row{display:flex;align-items:center;gap:10px}
.prob-word{width:90px;font-size:14px;font-weight:700;font-family:monospace;color:var(--text);flex-shrink:0}
.prob-track{flex:1;height:12px;background:rgba(0,0,0,.06);border-radius:6px;overflow:hidden}
.prob-fill{height:100%;border-radius:6px;transition:width .5s ease}
.prob-pct{font-size:13px;font-weight:800;min-width:36px;text-align:right;color:var(--sub)}

/* 对比两列 */
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1}
.cmp-col{border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.cmp-col.bad{background:rgba(220,38,38,.04);border:1.5px solid rgba(220,38,38,.18)}
.cmp-col.good{background:rgba(22,163,74,.04);border:1.5px solid rgba(22,163,74,.18)}
.cmp-head{font-size:14px;font-weight:800}
.cmp-col.bad .cmp-head{color:var(--red)}
.cmp-col.good .cmp-head{color:var(--green)}
.cmp-body{font-size:15px;color:var(--sub);line-height:1.65;flex:1}
.cmp-body b{color:var(--text)}

/* 代码块 */
pre.code{background:#1e1e2e;border-radius:10px;padding:14px 16px;font-family:'SF Mono',Menlo,monospace;font-size:13.5px;line-height:1.75;color:#cdd6f4;overflow:auto;white-space:pre;flex-shrink:0}
pre.code .c{color:#6c7086;font-style:italic}
pre.code .k{color:#cba6f7}
pre.code .s{color:#a6e3a1}
pre.code .f{color:#89b4fa}
pre.code .hl{color:#f38ba8}

/* 结果统计 */
.stats{display:flex;gap:10px;flex-shrink:0}
.stat{flex:1;border-radius:10px;padding:12px 14px;text-align:center}
.stat .sv{font-size:26px;font-weight:900}
.stat .sl{font-size:12px;font-weight:700;margin-top:2px;color:var(--muted)}
.stat.red-s{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.15)}.stat.red-s .sv{color:var(--red)}
.stat.green-s{background:rgba(22,163,74,.07);border:1px solid rgba(22,163,74,.15)}.stat.green-s .sv{color:var(--green)}
.stat.blue-s{background:rgba(0,102,255,.07);border:1px solid rgba(0,102,255,.15)}.stat.blue-s .sv{color:var(--accent)}
.stat.gray-s{background:var(--surface);border:1px solid var(--border)}.stat.gray-s .sv{color:var(--text)}

/* 警告/提示 */
.tip{border-radius:10px;padding:11px 14px;font-size:15px;line-height:1.6;flex-shrink:0}
.tip.green{background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2);color:var(--green)}
.tip.red{background:rgba(220,38,38,.05);border:1px solid rgba(220,38,38,.2);color:var(--red)}
.tip.purple{background:rgba(91,79,207,.06);border:1px solid rgba(91,79,207,.2);color:var(--purple)}
.tip b{font-weight:800}

/* 按钮 */
.btn-row{display:flex;gap:8px;flex-shrink:0;align-items:center}
.btn{padding:9px 20px;border-radius:9px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-p{background:var(--accent);color:white}
.btn-p:hover{filter:brightness(1.1)}
.btn-p:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-r{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}
.btn-hint{font-size:13px;color:var(--muted)}

/* KV 缓存条 */
.kv-bar{height:36px;border-radius:8px;overflow:hidden;display:flex;gap:1px;background:var(--surface2);transition:all .4s}
.kv-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:white;white-space:nowrap;overflow:hidden;padding:0 6px;transition:all .5s ease;border-radius:4px}
.kv-seg.sys-stable{background:var(--purple)}
.kv-seg.kv-cached{background:rgba(22,163,74,.35);color:var(--green)}
.kv-seg.kv-miss{background:var(--red)}
.kv-seg.kv-new{background:var(--accent)}

/* 闪烁动画 */
@keyframes flash-red{0%{background:rgba(220,38,38,.5)}100%{background:rgba(220,38,38,.07)}}
.flash-red{animation:flash-red .4s ease}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease}
@keyframes row-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.row-in{animation:row-in .3s ease}
</style>

<script>
/* ========== 技巧0：负向约束 ========== */
function demo0() {
  return `
  <div class="demo-heading">
    <h3>负向约束：不要写"请简洁"</h3>
    <p>"简洁"对模型太抽象。明确说<b style="color:var(--red)">不能做什么</b>，比"要简洁"管用得多。</p>
  </div>
  <div class="demo-body">
    <div class="cmp" style="flex:none;height:auto">
      <div class="cmp-col bad">
        <div class="cmp-head">❌ 模糊正向约束</div>
        <div class="cmp-body" style="font-family:monospace;font-size:15px;background:rgba(220,38,38,.04);border-radius:8px;padding:10px">
          请简洁地回答用户问题，<br>尽量不要啰嗦。
        </div>
        <div style="font-size:13px;color:var(--red);font-weight:700">模型不知道多简洁算简洁 😐</div>
      </div>
      <div class="cmp-col good">
        <div class="cmp-head">✅ 明确负向约束</div>
        <div class="cmp-body" style="font-family:monospace;font-size:15px;background:rgba(22,163,74,.04);border-radius:8px;padding:10px">
          直接输出结果。<br><b>不要</b>寒暄、<b>不要</b>总结、<br><b>不要</b>客套、<b>不要</b>解释过程。
        </div>
        <div style="font-size:13px;color:var(--green);font-weight:700">确定性否定 → 模型精准执行 ✓</div>
      </div>
    </div>
    <div class="card" style="flex:1">
      <div class="card-title">点击"生成"看两种约束下的输出对比</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;height:calc(100% - 30px)">
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:6px">❌ 模糊约束输出</div>
          <div id="out0bad" style="font-size:15px;color:var(--sub);line-height:1.7;min-height:80px"></div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--green);margin-bottom:6px">✅ 负向约束输出</div>
          <div id="out0good" style="font-size:15px;color:var(--sub);line-height:1.7;min-height:80px"></div>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-p" id="btn0" onclick="runDemo0()">▶ 模拟生成</button>
      <button class="btn btn-r" onclick="resetDemo0()">重置</button>
      <span class="btn-hint">用户问：今天天气怎么样？</span>
    </div>
    <div class="stats">
      <div class="stat red-s"><div class="sv" id="s0bad">—</div><div class="sl">模糊约束 Token</div></div>
      <div class="stat green-s"><div class="sv" id="s0good">—</div><div class="sl">负向约束 Token</div></div>
      <div class="stat blue-s"><div class="sv" id="s0save">—</div><div class="sl">节省比例</div></div>
    </div>
  </div>`;
}

const BAD_WORDS = ['您好！我很乐意为您解答。', '今天', '北京', '的天气', '是晴天，', '温度约', '22°C，', '微风，', '空气质量', '良好。', '希望这个', '回答对', '您有帮助！', '如有其他', '问题欢迎', '随时提问。'];
const GOOD_WORDS = ['晴天', '22°C', '微风'];
let d0Timer = null;

function runDemo0() {
  document.getElementById('btn0').disabled = true;
  let bi = 0, gi = 0;
  const badEl = document.getElementById('out0bad');
  const goodEl = document.getElementById('out0good');
  badEl.innerHTML = ''; goodEl.innerHTML = '';

  d0Timer = setInterval(() => {
    if (bi < BAD_WORDS.length) {
      badEl.innerHTML += `<span style="color:var(--text)">${BAD_WORDS[bi]}</span>`;
      bi++;
    }
    if (gi < GOOD_WORDS.length) {
      goodEl.innerHTML += `<span style="color:var(--green);font-weight:700;font-size:18px">${GOOD_WORDS[gi]} </span>`;
      gi++;
    }
    if (bi >= BAD_WORDS.length && gi >= GOOD_WORDS.length) {
      clearInterval(d0Timer);
      document.getElementById('s0bad').textContent = '48T';
      document.getElementById('s0good').textContent = '12T';
      document.getElementById('s0save').textContent = '75%';
      document.getElementById('s0save').classList.add('pop');
    }
  }, 180);
}

function resetDemo0() {
  clearInterval(d0Timer);
  ['out0bad','out0good'].forEach(id => document.getElementById(id).innerHTML = '');
  ['s0bad','s0good','s0save'].forEach(id => document.getElementById(id).textContent = '—');
  document.getElementById('btn0').disabled = false;
}

/* ========== 技巧1：Diff 输出 ========== */
function demo1() {
  return `
  <div class="demo-heading">
    <h3>Diff 输出：润色只输出修改的部分</h3>
    <p>用户说"改通顺一点"，模型会把整篇 2000 字全部输出。<b style="color:var(--red)">只动那两三个词，成本差几十倍。</b></p>
  </div>
  <div class="demo-body">
    <div class="card">
      <div class="card-title">原文（用户提交）</div>
      <div style="font-size:17px;color:var(--text);line-height:1.7;padding:4px 0">
        他非常猛烈地把那扇大门关闭了起来，发出了巨大的声响，然后就走了。
      </div>
    </div>
    <div class="cmp" style="flex:1">
      <div class="cmp-col bad">
        <div class="cmp-head">❌ 旧做法：重写全文</div>
        <div class="cmp-body" id="diffBad" style="font-size:15px;min-height:60px"></div>
        <div style="font-size:13px;color:var(--red);font-weight:700" id="diffBadTok"></div>
      </div>
      <div class="cmp-col good">
        <div class="cmp-head">✅ Diff 输出：只改动的句子</div>
        <div class="cmp-body" id="diffGood" style="font-size:15px;min-height:60px"></div>
        <div style="font-size:13px;color:var(--green);font-weight:700" id="diffGoodTok"></div>
      </div>
    </div>
    <pre class="code" style="font-size:13px"><span class="c"># System Prompt 约束</span>
<span class="s">"只输出需要修改的句子，格式：
 原文：[原句]
 改后：[新句]
 不要输出未修改的内容。"</span></pre>
    <div class="btn-row">
      <button class="btn btn-p" id="btn1" onclick="runDemo1()">▶ 模拟润色</button>
      <button class="btn btn-r" onclick="resetDemo1()">重置</button>
    </div>
    <div class="stats">
      <div class="stat red-s"><div class="sv" id="s1bad">—</div><div class="sl">重写全文 Token</div></div>
      <div class="stat green-s"><div class="sv" id="s1good">—</div><div class="sl">Diff 输出 Token</div></div>
      <div class="stat blue-s"><div class="sv" id="s1save">—</div><div class="sl">节省</div></div>
    </div>
  </div>`;
}

let d1t = null;
function runDemo1() {
  document.getElementById('btn1').disabled = true;
  const badSegs = ['他', '非常猛烈地', '把那扇大门', '关闭了起来，', '发出了巨大的声响，', '然后就走了。'];
  let i = 0;
  document.getElementById('diffBad').innerHTML = '';
  d1t = setInterval(() => {
    if (i < badSegs.length) {
      document.getElementById('diffBad').innerHTML += `<span style="color:var(--text)">${badSegs[i]}</span>`;
      i++;
    } else {
      clearInterval(d1t);
      document.getElementById('diffBadTok').textContent = '约 48 Token（输出整句话）';
      setTimeout(() => {
        const g = document.getElementById('diffGood');
        g.innerHTML = `<div style="margin-bottom:6px"><span style="color:var(--muted)">原文：</span><span style="text-decoration:line-through;color:var(--red)">他非常猛烈地把那扇大门关闭了起来</span></div>`;
        setTimeout(() => {
          g.innerHTML += `<div><span style="color:var(--muted)">改后：</span><span style="color:var(--green);font-weight:700">他轻轻带上了门。</span></div>`;

const QUESTIONS4 = [
  '你们的退款政策是什么？',
  '退款需要多少个工作日？',
  '运费谁来承担？',
  '退款到哪个账户？',
  '申请了为什么还没处理？'
];
const SYS4_TOK = 150;
const TURN_TOK = 40;
let d4r = 0, d4slidTotal = 0, d4layerTotal = 0, d4slidHits = 0, d4layerHits = 0;
const WSIZE = 3;

// 生成可视化上下文块
function makeCtxBlocks(segments) {
  // segments: [{label, color, hit, width}]
  return segments.map(s => {
    const hitMark = s.hit === true ? '✓' : s.hit === false ? '✗' : '';
    const opacity = s.dim ? 0.22 : 1;
    return `<div style="
      flex:${s.flex||1};min-width:${s.minW||36}px;max-width:${s.maxW||120}px;
      background:${s.bg};color:${s.color};
      border-radius:8px;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-size:11px;font-weight:700;line-height:1.3;
      opacity:${opacity};transition:all .4s ease;
      border:${s.border||'none'};
      padding:2px 4px;text-align:center
    "><span>${s.label}</span>${hitMark?`<span style="font-size:14px">${hitMark}</span>`:''}</div>`;
  }).join('');
}

function runDemo4() {
  if (d4r >= QUESTIONS4.length) return;
  const q = QUESTIONS4[d4r];
  d4r++;

  const isFirst = d4r === 1;
  // 滑动窗口：保留最近 WSIZE 轮
  const winStart = Math.max(1, d4r - WSIZE + 1);
  const winRounds = Math.min(d4r, WSIZE);

  // ── 左侧可视化：滑动窗口 ──
  // 前缀 = SYS + 窗口历史。第1轮写入，之后前缀总变 → MISS
  const slidMiss = !isFirst; // 轮1 写入，之后每轮都 MISS
  if (!slidMiss) d4slidHits++;
  const slidCost = SYS4_TOK + winRounds * TURN_TOK;
  d4slidTotal += slidCost;

  // 构建色块：SYS + 被丢弃轮次(暗) + 窗口内轮次
  const slidSegs = [];
  // SYS 块（始终在，但前缀后面历史变了，所以还是 MISS）
  slidSegs.push({label:`SYS\n${SYS4_TOK}T`, bg:'rgba(220,38,38,.15)', color:'var(--red)', flex:3, minW:60, hit: false, border:'1px solid rgba(220,38,38,.3)'});
  // 被丢弃的轮次（暗显示）
  for (let i = 1; i < winStart; i++) {
    slidSegs.push({label:`轮${i}\n丢弃`, bg:'rgba(0,0,0,.06)', color:'var(--muted)', flex:1, minW:32, dim:true});
  }
  // 窗口内的轮次
  for (let i = winStart; i <= d4r; i++) {
    const isNew = i === d4r;
    slidSegs.push({label:`轮${i}${isNew?'\n新':''}`, bg: isNew?'rgba(220,38,38,.12)':'rgba(220,38,38,.06)', color:isNew?'var(--red)':'rgba(220,38,38,.7)', flex:1, minW:36, border: isNew?'1px solid rgba(220,38,38,.3)':'none'});
  }
  document.getElementById('slidBar').innerHTML = makeCtxBlocks(slidSegs);

  const slidStatusHtml = isFirst
    ? `<b style="color:var(--accent)">⚡ 写入缓存</b>：SYS + 轮1 = ${slidCost}T`
    : `<b style="color:var(--red)">✗ MISS 全量重算 ${slidCost}T</b>：轮${winStart-1}被丢弃，前缀和上轮不同 → 缓存失效`;
  document.getElementById('slidStatus').innerHTML = slidStatusHtml;

  const slidHitRate = Math.round(d4slidHits / d4r * 100);
  document.getElementById('slidHitBar').style.width = slidHitRate + '%';
  document.getElementById('slidHitPct').textContent = slidHitRate + '%';
  document.getElementById('s4slidCost').textContent = d4slidTotal + 'T';

  // ── 右侧可视化：分层策略 ──
  // SYS 永远在最前且不变 → 命中；活跃最近3轮附加在后
  const layerMiss = false; // SYS 永远命中，新轮次计算量极少
  d4layerHits++;
  let layerCost;
  if (isFirst) layerCost = SYS4_TOK + TURN_TOK;
  else layerCost = TURN_TOK; // SYS 命中，只算新轮

  d4layerTotal += layerCost;

  // 构建分层色块
  const layerSegs = [];
  layerSegs.push({label:`SYS\n${SYS4_TOK}T`, bg: isFirst?'rgba(0,102,255,.12)':'rgba(22,163,74,.15)', color: isFirst?'var(--accent)':'var(--green)', flex:3, minW:60, hit: isFirst?undefined:true, border: isFirst?'1px solid rgba(0,102,255,.3)':'1px solid rgba(22,163,74,.3)'});
  // 活跃最近3轮
  const activeStart = Math.max(1, d4r - WSIZE + 1);
  for (let i = activeStart; i <= d4r; i++) {
    const isNew = i === d4r;
    layerSegs.push({label:`轮${i}${isNew?'\n新':''}`, bg: isNew?'rgba(0,102,255,.12)':'rgba(22,163,74,.08)', color: isNew?'var(--accent)':'var(--green)', flex:1, minW:36, border: isNew?'1px solid rgba(0,102,255,.3)':'none'});
  }
  document.getElementById('layerBar').innerHTML = makeCtxBlocks(layerSegs);

  const layerStatusHtml = isFirst
    ? `<b style="color:var(--accent)">⚡ 写入SYS缓存</b>：首轮写入 ${layerCost}T，后续 SYS 永久命中`
    : `<b style="color:var(--green)">✓ SYS 命中</b>：SYS 前缀不变 → 缓存命中！本轮只计算新增 <b>${layerCost}T</b>`;
  document.getElementById('layerStatus').innerHTML = layerStatusHtml;

  const layerHitRate = Math.round(d4layerHits / d4r * 100);
  document.getElementById('layerHitBar').style.width = layerHitRate + '%';
  document.getElementById('layerHitPct').textContent = layerHitRate + '%';
  document.getElementById('s4layerCost').textContent = d4layerTotal + 'T';

  // 当前问题展示
  document.getElementById('d4CurrentQ').innerHTML = `<span style="color:var(--muted);font-weight:600">第 ${d4r} 轮：</span>${q}`;

  // 日志对比
  const savings = slidCost - layerCost;
  document.getElementById('d4Log').innerHTML = [
    `<span style="color:var(--red)">滑动窗口本轮重算 <b>${slidCost}T</b></span>`,
    `<span style="color:var(--green)">分层策略本轮只算 <b>${layerCost}T</b></span>`,
    savings > 0 ? `<span style="color:var(--accent);font-weight:700">→ 本轮节省 ${savings}T（累计节省 ${d4slidTotal - d4layerTotal}T）</span>` : ''
  ].filter(Boolean).join('　　');

  document.getElementById('s4round2').textContent = `${d4r} / 5`;
  if (d4r >= QUESTIONS4.length) document.getElementById('btn4').disabled = true;
}

function resetDemo4() {
  d4r = 0; d4slidTotal = 0; d4layerTotal = 0; d4slidHits = 0; d4layerHits = 0;
  document.getElementById('slidBar').innerHTML = '';
  document.getElementById('layerBar').innerHTML = '';
  document.getElementById('slidStatus').innerHTML = '';
  document.getElementById('layerStatus').innerHTML = '';
  document.getElementById('slidHitBar').style.width = '0%';
  document.getElementById('layerHitBar').style.width = '0%';
  document.getElementById('slidHitPct').textContent = '—';
  document.getElementById('layerHitPct').textContent = '—';
  document.getElementById('s4slidCost').textContent = '0T';
  document.getElementById('s4layerCost').textContent = '0T';
  document.getElementById('s4round2').textContent = '0 / 5';
  document.getElementById('d4CurrentQ').innerHTML = '点击「下一轮」开始演示';
  document.getElementById('d4Log').innerHTML = '';
  document.getElementById('btn4').disabled = false;
}
