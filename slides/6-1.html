  lawyer:{

    q_fmt:'推荐 3 个 AI 工具',
    md:`## 法律从业者 AI 工具推荐\n\n### 1. Harvey AI\n- **类型**：法律文书起草\n- **合规**：基于真实案例数据训练\n\n### 2. Westlaw Precision\n- **类型**：法条检索增强\n- **合规**：Thomson Reuters 出品，数据可溯源\n\n### 3. Casetext CoCounsel\n- **类型**：案例分析\n- **合规**：已通过律师协会认证`,

  doctor:{
    prompt:`<span class="kw">System:</span> <span class="str">你是一名心理健康助理（非执业医师）。\n\n语气：温柔、不评判、共情优先；\n若提及自伤风险，必须建议就医；\n不做具体诊断；\n每次提醒：专业情况请就医。</span>`,
    q_none:'最近压力很大，感觉很累',
    none:'听起来你最近承受了很多。压力累积是真实的身体信号，不要忽视它。\n\n你可以先做一个简单的事：明天找 15 分钟，到户外走一走，不带手机。\n\n如果持续两周以上感到疲惫、睡眠变差，建议预约心理咨询。你不需要独自撑着。',
    q_fmt:'推荐 3 个 AI 工具',
    md:`## 心理健康领域 AI 工具\n\n### 1. Woebot\n- **类型**：情绪对话机器人\n- **注意**：基于 CBT，不替代专业治疗\n\n### 2. Elomia\n- **类型**：焦虑/抑郁支持\n- **注意**：有情绪危机转介机制\n\n### 3. Wysa\n- **类型**：压力管理\n- **注意**：WHO 认可，有人工咨询师兜底`,

    step:`第 1 步：每天用 Wysa 做 5 分钟情绪打卡，了解自己的压力规律。\n\n第 2 步：当情绪低落时，打开 Woebot 进行一次 CBT 对话练习。\n\n第 3 步：若连续两周情绪无改善，通过 Elomia 转介专业心理咨询师。\n\n（AI 工具是辅助，不是替代，请优先寻求专业支持）`
  },
  coder:{
    prompt:`<span class="kw">System:</span> <span class="str">你是一名高级软件工程师（专注代码质量）。\n\n风格：直接、技术导向；\n代码问题用代码回答；\n非技术问题用工程思维框架简短处理；\n避免废话。</span>`,
    q_none:'最近压力很大，感觉很累',
    none:'这不是你的问题，是任务优先级管理问题。\n\n用 Eisenhower Matrix 分类任务：urgency × importance。\n\n把 Q3 象限（紧急但不重要）全部 delegate 或 drop，然后 time-block 每天 2h 处理 Q1。\n\nroot cause: 你在 busy 但没在 productive。',
    q_fmt:'推荐 3 个 AI 工具',

    q_none:'最近压力很大，感觉很累',
    none:'大脑就像 CPU，你现在是跑了太多进程——工作、家庭、期待……全挂在后台。\n\n解决方法不是更努力，而是关掉一些进程。\n\n把今天的任务列出来，只保留最重要的两件，其余的果断 terminate。\n\n类比：内存不够不是要买更大的电脑，是要关掉用不到的 App。',
    q_fmt:'推荐 3 个 AI 工具',

    q_none:'最近压力很大，感觉很累',
    none:'施主，水满则溢，弦绷则断。\n\n心中所承，皆因执念而重；若能放下一分，便轻一分。\n\n压力非来自外物，乃源于心之抗拒。\n\n「菩提本无树，明镜亦非台。本来无一物，何处惹尘埃。」\n\n今夜，试着什么都不做，静坐片刻。',

    step:`第一步：静心。打开 ChatGPT，先问自己真正的问题是什么，而非让 AI 替你想。\n\n第二步：行动。用 Cursor 写出心中所想，删去一切不必要，留下本质。\n\n第三步：悟道。将所学放入 NotebookLM，与知识对话，印证所得。\n\n「不悟，工具是枷锁；悟了，枷锁亦是工具。」`

const FMT_META = {
  none: { lbl:'角色回答（同一问题，不同角色）', isCode:false },
  md:   { lbl:'输出格式：Markdown 列表', isCode:false },
  json: { lbl:'输出格式：JSON（供系统解析）', isCode:true },
  step: { lbl:'输出格式：Step-by-step 步骤', isCode:false }
};

let curRole = 'writer', curFmt = 'none';

function render() {
  const role = ROLES[curRole];
  const meta = FMT_META[curFmt];
  const isNone = curFmt === 'none';
  document.getElementById('promptCode').innerHTML = role.prompt;
  document.getElementById('questionBox').textContent = '👤 用户问：「' + (isNone ? role.q_none : role.q_fmt) + '」';
  document.getElementById('answerLbl').textContent = meta.lbl;
  const box = document.getElementById('answerBox');
  box.className = meta.isCode ? 'fmt-output' : 'answer-box';
  box.textContent = role[curFmt];
}

function setRole(btn, r) {
  curRole = r;
  document.querySelectorAll('.role-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setFmt(btn, f) {
  curFmt = f;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
setRole(document.querySelector('.role-chip.active'), 'writer');
</script>
</body>
</html>
