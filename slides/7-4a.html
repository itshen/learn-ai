<style>
:root{--bg:#f7f5f0;--text:#1c1c1e;--sub:#6b6b70;--border:rgba(0,0,0,.07);--surface:#fff;--surface2:#f0ede6;--orange:#ea580c;--green:#16a34a;--red:#dc2626;--cyan:#0891b2;--purple:#7c3aed;--muted:#8e8e93;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e5e2da;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;opacity:0;animation:si .15s ease .08s forwards;-webkit-font-smoothing:antialiased}
@keyframes si{to{opacity:1}}
.slide{width:94vw;max-width:1440px;aspect-ratio:16/9;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.hd{padding:10px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hd-tag{font-size:14px;font-weight:800;color:var(--orange)}
.hd-title{font-size:24px;font-weight:800;color:var(--text)}
.hd-title em{font-style:normal;color:var(--orange)}
.body{flex:1;display:grid;grid-template-columns:300px 1fr;min-height:0;overflow:hidden}

/* Left panel */
.left{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.l-section{padding:10px 16px;flex-shrink:0}
.l-label{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px;margin-bottom:6px}
.user-req{background:rgba(8,145,178,.06);border:1.5px solid rgba(8,145,178,.18);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.6;color:var(--text)}

/* Loop diagram */
.loop-vis{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px;min-height:0;overflow:visible}
.loop-svg{width:100%;height:100%;max-width:250px;max-height:250px;overflow:visible}

/* Stats */
.stats-bar{padding:8px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px;flex-shrink:0;background:var(--surface)}
.stat-row{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.stat-label{color:var(--muted);font-weight:600}
.stat-val{font-weight:800;color:var(--text)}
.stat-val.warn{color:var(--orange)}
.progress-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:2px}
.progress-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .4s ease}

/* Decision area */
.dec-area{padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;max-height:140px;overflow-y:auto}
.dec-card{background:rgba(234,88,12,.06);border:1.5px solid rgba(234,88,12,.2);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);line-height:1.5;opacity:0;transform:translateY(4px);transition:all .35s}
.dec-card.show{opacity:1;transform:translateY(0)}
.dec-card b{color:var(--orange)}

/* Right panel - iteration timeline */
.right{display:flex;flex-direction:column;overflow:hidden}
.r-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.r-title{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px}
.r-badge{display:flex;gap:10px}
.r-badge-item{font-size:13px;color:var(--muted);font-weight:600}
.r-badge-item span{font-weight:800;color:var(--text)}

.timeline{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:6px}

/* Iteration block */
.iter-block{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;opacity:0;transform:translateY(8px);transition:all .35s ease;flex-shrink:0;background:var(--surface)}
.iter-block.show{opacity:1;transform:translateY(0)}
.iter-hd{padding:5px 12px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;background:rgba(0,0,0,.025);border-bottom:1px solid var(--border)}
.iter-num{font-family:'SF Mono','Cascadia Code','Fira Code',monospace;font-size:13px;font-weight:800;color:var(--muted)}
.iter-body{padding:8px 12px;display:flex;flex-direction:column;gap:5px}

.react-row{display:flex;gap:8px;align-items:flex-start;font-size:14px;line-height:1.6}
.react-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:700}
.react-content{flex:1;min-width:0}
.react-label{font-size:11px;font-weight:800;letter-spacing:.5px;margin-bottom:1px}
.react-text{font-size:13.5px;color:var(--text);line-height:1.55}

/* Tool call visual */
.tool-call-box{background:rgba(234,88,12,.04);border:1px solid rgba(234,88,12,.15);border-radius:8px;padding:6px 10px;margin-top:2px}
.tool-fn{font-size:13px;font-weight:700;color:var(--orange);display:flex;align-items:center;gap:5px}
.tool-params{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tool-param{padding:2px 8px;border-radius:4px;font-size:12px;background:var(--surface);border:1px solid var(--border);color:var(--sub);font-weight:600}
.tool-param b{color:var(--text);font-weight:700}

/* Observation result */
.obs-result{padding:5px 9px;border-radius:6px;font-size:13px;margin-top:2px;font-weight:600}
.obs-ok{background:rgba(22,163,74,.06);color:var(--green);border:1px solid rgba(22,163,74,.15)}
.obs-fail{background:rgba(220,38,38,.06);color:var(--red);border:1px solid rgba(220,38,38,.15)}
.obs-info{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}

/* Fast-forward indicator */
.fast-fwd{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(124,58,237,.04);border:1px dashed rgba(124,58,237,.2);font-size:13px;color:var(--purple);font-weight:600;opacity:0;transform:translateY(6px);transition:all .3s;flex-shrink:0}
.fast-fwd.show{opacity:1;transform:translateY(0)}

/* Final answer */
.final-answer{border:1.5px solid rgba(22,163,74,.25);border-radius:10px;background:rgba(22,163,74,.04);padding:10px 14px;opacity:0;transform:translateY(8px);transition:all .4s;flex-shrink:0}
.final-answer.show{opacity:1;transform:translateY(0)}
.fa-label{font-size:11px;font-weight:800;color:var(--green);letter-spacing:.5px;margin-bottom:4px}
.fa-text{font-size:14px;color:var(--text);line-height:1.6}

/* Controls */
.ctrl{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0;background:var(--surface)}
.btn{padding:7px 18px;border-radius:8px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-p{background:var(--orange);color:white}
.btn-p:hover{filter:brightness(1.1)}
.btn-p:disabled{opacity:.3;cursor:not-allowed}
.btn-r{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}
.ctrl-hint{font-size:13px;color:var(--muted)}

.insight-bar{padding:6px 24px;border-top:1px solid var(--border);font-size:13.5px;color:var(--text);line-height:1.5;flex-shrink:0;display:flex;align-items:center;gap:8px}
.insight-bar b{color:var(--orange)}

/* SVG animations */
@keyframes rotate-loop{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse-node{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.node-active{animation:pulse-node .8s ease infinite}
.loop-arrow{opacity:.2;transition:opacity .4s}
.loop-arrow.active{opacity:1}

var cur = 0;
var activeNodes = {thought:false, action:false, obs:false};

function highlightNode(name) {
  ['thought','action','obs'].forEach(function(n) {
    var el = document.getElementById('node-' + (n === 'obs' ? 'obs' : n));
    var circle = el ? el.querySelector('circle') : null;
    if (!circle) return;
    if (n === name || (name === 'observation' && n === 'obs')) {
      circle.setAttribute('stroke-width', '3');
      el.classList.add('node-active');
    } else {
      circle.setAttribute('stroke-width', '2');
      el.classList.remove('node-active');
    }
  });

  var arcs = {
    thought: ['arc-t2a'],
    action: ['arc-a2o'],
    observation: ['arc-o2t', 'arc-loop']
  };
  ['arc-t2a','arc-a2o','arc-o2t','arc-loop'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var keys = arcs[name] || [];
    el.classList.toggle('active', keys.indexOf(id) >= 0);
  });
}

function clearHighlights() {
  ['thought','action','obs'].forEach(function(n) {
    var el = document.getElementById('node-' + n);
    if (el) {
      el.classList.remove('node-active');
      var c = el.querySelector('circle');
      if (c) c.setAttribute('stroke-width', '2');
    }
  });
  ['arc-t2a','arc-a2o','arc-o2t','arc-loop'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
}

function renderIteration(step, delay) {
  var tl = document.getElementById('timeline');

  if (step.fastForward) {
    var ff = document.createElement('div');
    ff.className = 'fast-fwd';
    ff.textContent = step.ffText;
    tl.appendChild(ff);
    setTimeout(function() {
      ff.classList.add('show');
      tl.scrollTop = tl.scrollHeight;
    }, delay);
    return;
  }

  if (step.finalAnswer) {
    var fa = document.createElement('div');
    fa.className = 'final-answer';
    fa.innerHTML = '<div class="fa-label">💬 最终回答（循环结束）</div><div class="fa-text">' + step.finalAnswer + '</div>';
    tl.appendChild(fa);
    setTimeout(function() {
      fa.classList.add('show');
      tl.scrollTop = tl.scrollHeight;
    }, delay);
    return;
  }

  var block = document.createElement('div');
  block.className = 'iter-block';

  var iterLabel = step.iter ? '第 ' + step.iter + ' 轮' : '';
  var hdHtml = '<div class="iter-hd"><span class="iter-num">' + iterLabel + '</span>';
  hdHtml += '<span style="font-size:12px;color:var(--muted);font-weight:600">LLM call + tool call</span></div>';

  var bodyHtml = '<div class="iter-body">';
  for (var i = 0; i < step.items.length; i++) {
    var item = step.items[i];
    bodyHtml += buildReactRow(item);
  }
  bodyHtml += '</div>';

  block.innerHTML = hdHtml + bodyHtml;
  tl.appendChild(block);

  var baseDelay = delay;
  var rows = block.querySelectorAll('.react-row');
  rows.forEach(function(row, idx) {
    row.style.opacity = '0';
    row.style.transform = 'translateY(4px)';
    row.style.transition = 'all .3s ease';
    setTimeout(function() {
      row.style.opacity = '1';
      row.style.transform = 'translateY(0)';
      var phase = step.items[idx] ? step.items[idx].phase : null;
      if (phase) highlightNode(phase);
    }, baseDelay + idx * 250);
  });

  setTimeout(function() {
    block.classList.add('show');
    tl.scrollTop = tl.scrollHeight;
  }, delay);
}

function buildReactRow(item) {
  var colors = {
    thought: {bg:'rgba(124,58,237,.06)', color:'var(--purple)', label:'THOUGHT · 思考', icon:'🧠'},
    action:  {bg:'rgba(234,88,12,.06)',  color:'var(--orange)', label:'ACTION · 行动',  icon:'🔧'},
    observation: {bg:'rgba(22,163,74,.06)', color:'var(--green)', label:'OBSERVATION · 观察', icon:'👁'}
  };
  var c = colors[item.phase];
  var html = '<div class="react-row">';
  html += '<div class="react-icon" style="background:' + c.bg + '">' + c.icon + '</div>';
  html += '<div class="react-content">';
  html += '<div class="react-label" style="color:' + c.color + '">' + c.label + '</div>';

  if (item.phase === 'action') {
    html += '<div class="tool-call-box"><div class="tool-fn">↗ tool_call → ' + item.fn + '()</div>';
    html += '<div class="tool-params">';
    for (var p = 0; p < item.params.length; p++) {
      html += '<div class="tool-param"><b>' + item.params[p][0] + ':</b> ' + item.params[p][1] + '</div>';
    }
    html += '</div></div>';
  } else if (item.phase === 'observation') {
    var cls = item.status === 'ok' ? 'obs-ok' : (item.status === 'fail' ? 'obs-fail' : 'obs-info');
    html += '<div class="obs-result ' + cls + '" style="white-space:pre-line">' + item.text + '</div>';
  } else {
    html += '<div class="react-text" style="color:var(--sub);font-style:italic">"' + item.text + '"</div>';
  }

  html += '</div></div>';
  return html;
}

function next() {
  if (cur >= STEPS.length) return;
  var s = STEPS[cur];

  document.getElementById('hint').textContent = s.hint;

  var iterVal = s.iter || '-';
  document.getElementById('iterNum').textContent = iterVal + ' / 50';
  document.getElementById('iterProgress').style.width = ((s.iter || 0) / 50 * 100) + '%';
  document.getElementById('toolCount').textContent = s.tools;
  var tokenEl = document.getElementById('tokenCount');
  tokenEl.textContent = s.tokens.toLocaleString();
  if (s.tokens > 20000) tokenEl.classList.add('warn');

  if (s.activeNode) {
    highlightNode(s.activeNode);
  } else {
    clearHighlights();
  }

  renderIteration(s, 50);

  if (s.decision) {
    var da = document.getElementById('decArea');
    da.innerHTML = '<div class="dec-card">' + s.decision + '</div>';
    requestAnimationFrame(function() { requestAnimationFrame(function() {
      var dc = da.querySelector('.dec-card');
      if (dc) dc.classList.add('show');
    })});
  }

  cur++;
  if (cur >= STEPS.length) {
    document.getElementById('btnNext').disabled = true;
    document.getElementById('btnNext').textContent = '✓ 完成';
  }
}

function reset() {
  cur = 0;
  document.getElementById('timeline').innerHTML = '';
  document.getElementById('decArea').innerHTML = '';
  document.getElementById('iterNum').textContent = '0 / 50';
  document.getElementById('iterProgress').style.width = '0%';
  document.getElementById('toolCount').textContent = '0';
  var tokenEl = document.getElementById('tokenCount');
  tokenEl.textContent = '0';
  tokenEl.classList.remove('warn');
  document.getElementById('hint').textContent = '共 8 步 · 看一个复杂任务如何经历多轮循环';
  document.getElementById('btnNext').disabled = false;
  document.getElementById('btnNext').textContent = '▶ 下一步';
  clearHighlights();
}
</script>
</body>
</html>
