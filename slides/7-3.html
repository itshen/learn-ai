<style>
:root{--bg:#f7f5f0;--text:#1c1c1e;--sub:#6b6b70;--border:rgba(0,0,0,0.08);--surface:white;--surface2:#f0ede6;--orange:#ea580c;--green:#16a34a;--red:#dc2626;--muted:#8e8e93;--cyan:#0891b2;--purple:#7c3aed;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e5e2da;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;opacity:0;animation:_si .15s ease .08s forwards;-webkit-font-smoothing:antialiased}
@keyframes _si{to{opacity:1}}
.slide{width:94vw;max-width:1440px;aspect-ratio:16/9;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.hd{padding:12px 32px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hd-tag{font-size:14px;font-weight:800;color:var(--orange)}
.hd-title{font-size:24px;font-weight:800;color:var(--text)}
.hd-title em{font-style:normal;color:var(--orange)}
.body{flex:1;display:grid;grid-template-columns:300px 1fr;min-height:0;overflow:hidden}

/* 左栏 */
.left{padding:14px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:10px;overflow:hidden}
.l-desc{font-size:15px;color:var(--sub);line-height:1.65}
.l-desc strong{color:var(--text)}

/* 循环计数器 */
.loop-counter{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.lc-row{display:flex;justify-content:space-between;align-items:center}
.lc-label{font-size:13px;color:var(--muted);font-weight:600}
.lc-val{font-size:22px;font-weight:900;color:var(--text);transition:color .3s}
.lc-val.warn{color:var(--amber)}
.lc-val.danger{color:var(--red)}
.lc-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.lc-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease,background .4s}
.lc-fill.warn{background:var(--amber)}
.lc-fill.danger{background:var(--red)}

.status-badge{padding:5px 12px;border-radius:7px;font-size:13px;font-weight:700;text-align:center;flex-shrink:0;transition:all .3s}

/* 进度控制 */
.ctrl-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.btn-next{padding:7px 18px;border-radius:8px;background:var(--orange);color:white;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .2s}
.btn-next:disabled{opacity:.35;cursor:not-allowed}
.btn-reset{padding:7px 12px;border-radius:8px;background:var(--surface2);color:var(--sub);font-size:14px;border:1px solid var(--border);cursor:pointer;font-family:inherit}
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .35s}

.insight{background:rgba(220,38,38,.05);border:1.5px solid rgba(220,38,38,.18);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);line-height:1.6;flex-shrink:0}
.insight b{color:var(--red)}
.insight.ok{background:rgba(22,163,74,.05);border-color:rgba(22,163,74,.2)}
.insight.ok b{color:var(--green)}

/* 右栏 */
.right{display:flex;flex-direction:column;overflow:hidden}
.r-hd{padding:8px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
.r-hd-label{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--muted);text-transform:uppercase}
.r-hd-task{font-size:14px;font-weight:700;color:var(--text)}

/* 消息流 */
.msg-area{flex:1;overflow-y:auto;padding:10px 16px;display:flex;flex-direction:column;gap:6px}

.msg{display:flex;gap:10px;opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease}
.msg.show{opacity:1;transform:translateY(0)}
.msg-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.msg-body{flex:1;min-width:0}
.msg-role{font-size:10px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px}
.msg-bubble{border-radius:9px;padding:8px 12px;font-size:13.5px;line-height:1.65}

/* 错误shake */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.shake{animation:shake .4s ease}

.code{font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.k{color:#7c3aed}.s{color:#16a34a}.c{color:#9ca3af;font-style:italic}.fn{color:#0891b2}.err{color:#dc2626;font-weight:700}

/* 底栏 */
.r-ft{padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.ft-msg{font-size:13px;color:var(--muted);font-weight:600;transition:color .3s}

    }]

let cur = 0;

function nextStep() {
  if (cur >= STEPS.length) return;
  const s = STEPS[cur];

  // 更新左栏计数
  const lc = document.getElementById('loopCount');
  lc.textContent = s.loop;
  lc.className = 'lc-val' + (s.fails >= 3 ? ' danger' : s.fails >= 1 ? ' warn' : '');
  const fill = document.getElementById('loopFill');
  fill.style.width = (s.loop / 4 * 100) + '%';
  fill.className = 'lc-fill' + (s.fails >= 3 ? ' danger' : s.fails >= 1 ? ' warn' : '');
  document.getElementById('callCount').textContent = s.calls + ' 次';
  document.getElementById('failCount').textContent = s.fails + ' 次';

  const badge = document.getElementById('statusBadge');
  badge.textContent = s.status;
  badge.style.background = s.statusBg;
  badge.style.color = s.statusColor;

  // 进度条
  document.getElementById('progFill').style.width = ((cur+1)/STEPS.length*100)+'%';
  document.getElementById('stepNum').textContent = `${cur+1} / ${STEPS.length}`;
  document.getElementById('ftMsg').textContent = s.ft;

  // 渲染消息
  const area = document.getElementById('msgArea');
  s.msgs.forEach((m, mi) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'msg';
      el.innerHTML = `
        <div class="msg-icon" style="background:${m.iconBg}">${m.icon}</div>
        <div class="msg-body">
          <div class="msg-role" style="color:${m.roleColor}">${m.role}</div>
          <div class="msg-bubble" style="background:${m.bg};border:1.5px solid ${m.border}">${m.html}</div>
        </div>`;
      area.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.classList.add('show');
        if (m.shake) setTimeout(() => el.querySelector('.msg-bubble').classList.add('shake'), 350);
        area.scrollTop = area.scrollHeight;
      }));
    }, mi * 180);
  });

  cur++;

  // 最后一步
  if (cur >= STEPS.length) {
    document.getElementById('btnNext').disabled = true;
    document.getElementById('btnNext').textContent = '✓ 完成';
    document.getElementById('stepText').textContent = '演示结束';
    const ib = document.getElementById('insightBox');
    ib.className = 'insight ok';
    ib.innerHTML = '<b>这正是脚手架的价值：</b>加入参数验证、格式说明、最大重试次数限制，Agent 就不会无限打转。下一页介绍如何用脚手架解决这个问题。';
  }
}

function resetAll() {
  cur = 0;
  document.getElementById('msgArea').innerHTML = '';
  document.getElementById('loopCount').textContent = '0';
  document.getElementById('loopCount').className = 'lc-val';
  document.getElementById('loopFill').style.width = '0%';
  document.getElementById('loopFill').className = 'lc-fill';
  document.getElementById('callCount').textContent = '0 次';
  document.getElementById('failCount').textContent = '0 次';
  document.getElementById('statusBadge').textContent = '等待开始';
  document.getElementById('statusBadge').style.background = 'var(--surface2)';
  document.getElementById('statusBadge').style.color = 'var(--muted)';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('stepNum').textContent = '0 / 10';
  document.getElementById('stepText').textContent = '共 10 步';
