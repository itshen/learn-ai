<style>
:root {
  --bg: #f7f5f0; --text: #1c1c1e; --sub: #6b7280;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #e5e2da;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  height: 100vh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: 94vw; max-width: 1440px; aspect-ratio: 16/9;
  background: var(--bg); border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; overflow: hidden;
}
.header {
  padding: 14px 36px; flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
.header h2 { font-size: 20px; font-weight: 800; color: var(--text); }
.header p  { font-size: 12px; color: var(--sub); margin-top: 2px; }
.btn-next {
  background: var(--accent); color: white; border: none;
  padding: 9px 22px; border-radius: 12px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-next:hover { filter: brightness(1.1); transform: translateY(-1px); }

.body { flex: 1; display: flex; min-height: 0; }

/* ── Left ── */
.left {
  width: 40%; padding: 20px 28px 20px 36px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 14px;
  justify-content: center; overflow: hidden;
}

.big-num {
  font-size: 72px; font-weight: 900; color: var(--accent);
  line-height: 1; letter-spacing: -3px;
  transition: transform 0.2s;
}
.big-num.pop { transform: scale(1.06); }
.big-label { font-size: 15px; font-weight: 700; color: var(--sub); margin-top: 4px; }

/* corpus bars */
.corpus-list { display: flex; flex-direction: column; gap: 7px; }
.corpus-row  { display: flex; align-items: center; gap: 10px; }
.corpus-name { width: 70px; font-size: 13px; font-weight: 700; color: var(--sub); text-align: right; flex-shrink: 0; }
.corpus-track { flex: 1; height: 24px; background: rgba(0,0,0,0.05); border-radius: 7px; overflow: hidden; }
.corpus-fill {
  height: 100%; border-radius: 7px; width: 0;
  display: flex; align-items: center; padding-left: 10px;
  transition: width 0.9s cubic-bezier(0.25,1,0.5,1);
}
.corpus-fill span { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.95); }
.corpus-pct { width: 38px; font-size: 13px; font-weight: 800; text-align: right; flex-shrink: 0; }

.insight {
  background: rgba(217,119,6,0.06); border: 1.5px solid rgba(217,119,6,0.2);
  border-radius: 12px; padding: 12px 16px;
  font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.6;
  opacity: 0; transform: translateY(6px); transition: opacity 0.4s, transform 0.4s;
}
.insight.show { opacity: 1; transform: translateY(0); }
.insight span { font-size: 13px; font-weight: 400; color: var(--sub); }

/* ── Right ── */
.right {
  flex: 1; padding: 16px 24px;
  display: flex; flex-direction: column; gap: 10px; overflow: hidden;
}
.right-top-label {
  font-size: 12px; font-weight: 800; color: var(--sub);
  letter-spacing: 0.4px; text-transform: uppercase; flex-shrink: 0;
}

/* slider */
.slider-wrap { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
.slider-val { font-size: 18px; font-weight: 900; color: var(--accent); min-width: 100px; }
.slider-mode-badge {
  font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 8px;
  white-space: nowrap; transition: all 0.3s;
}
input[type=range] {
  flex: 1; accent-color: var(--accent); cursor: pointer; height: 6px;
}

/* 右侧双区布局：上方规模感受 + 下方实测卡片 */
.right-panels {
  flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 10px; min-height: 0;
}

/* 规模感受卡 */
.vis-box {
  background: white; border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 14px 18px; display: flex; flex-direction: column; gap: 8px;
  flex-shrink: 0;
}
.vis-analogy {
  font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.5;
}
.vis-analogy b { color: var(--accent); }
.vis-analogy .sub { font-size: 12px; font-weight: 400; color: var(--sub); margin-top: 2px; }

/* icon grid */
.icon-grid {
  display: flex; flex-wrap: wrap;
  align-content: flex-start; gap: 3px;
  max-height: 52px; overflow: hidden;
}
.icon-unit {
  font-size: 17px; line-height: 1;
  opacity: 0; transform: scale(0.5);
  transition: opacity 0.15s, transform 0.15s;
}
.icon-unit.in { opacity: 1; transform: scale(1); }

/* scale bar */
.scale-bar-wrap { }
.scale-bar-track {
  height: 8px; background: rgba(0,0,0,0.06); border-radius: 8px; overflow: hidden;
}
.scale-bar-fill {
  height: 100%; border-radius: 8px; background: var(--accent);
  transition: width 0.5s cubic-bezier(0.25,1,0.5,1);
}
.scale-bar-labels {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--sub); margin-top: 3px; font-weight: 600;
}

.model-card {
  flex: 1; min-width: 0; border-radius: 14px; border: 2px solid var(--border);
  padding: 14px 18px; display: flex; flex-direction: column; gap: 8px;
  transition: border-color 0.3s, background 0.3s;
  min-height: 0; overflow: hidden;

.model-card.is-hallucination { border-color: rgba(229,62,62,0.45); background: rgba(229,62,62,0.03); }
.model-card.is-unknown       { border-color: rgba(217,119,6,0.45);  background: rgba(217,119,6,0.03); }
.model-card.is-correct       { border-color: rgba(22,163,74,0.5);   background: rgba(22,163,74,0.04); }

.model-card-header {
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.model-size-big {
  font-size: 28px; font-weight: 900; line-height: 1;
  transition: color 0.3s;
}
.is-hallucination .model-size-big { color: var(--danger); }
.is-unknown       .model-size-big { color: var(--amber); }
.is-correct       .model-size-big { color: var(--success); }

.model-card-meta { flex: 1; }
.model-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
.model-card-tag  { font-size: 11px; color: var(--sub); margin-top: 1px; }

.verdict-badge {
  font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 8px;
  flex-shrink: 0;
}
.is-hallucination .verdict-badge { background: var(--danger); color: white; }
.is-unknown       .verdict-badge { background: var(--amber);  color: white; }
.is-correct       .verdict-badge { background: var(--success); color: white; }

.model-card-q {
  font-size: 11px; font-weight: 700; color: var(--sub); flex-shrink: 0;
}
.model-card-answer {
  flex: 1; min-width: 0; min-height: 0;
  font-size: 13px; color: var(--text); line-height: 1.7;
  border-radius: 10px; padding: 10px 14px;
  overflow-y: auto;
  transition: background 0.3s;
}
.is-hallucination .model-card-answer { background: rgba(229,62,62,0.05); }
.is-unknown       .model-card-answer { background: rgba(217,119,6,0.05); }
.is-correct       .model-card-answer { background: rgba(22,163,74,0.05); }

.model-card-answer .wrong { color: var(--danger); font-weight: 700; }
.model-card-answer .right { color: var(--success); font-weight: 700; }
.model-card-answer b { color: var(--success); font-weight: 700; }

.model-card-tip {
  font-size: 11px; color: var(--sub); flex-shrink: 0; line-height: 1.5;
}
.model-card-tip b { color: var(--text); }

let currentScale = 0;

// 类型 → 样式映射
const VERDICT_CLASS = {
  hallucination: 'is-hallucination',
  unknown:       'is-unknown',
  correct:       'is-correct',
};
const BADGE_COLORS = {
  hallucination: { bg: 'var(--danger)', text: 'white' },
  unknown:       { bg: 'var(--amber)',  text: 'white' },
  correct:       { bg: 'var(--success)', text: 'white' },
};

function updateScale(v) {
  const s = SCALES[+v];
  currentScale = +v;

  // 左侧大数字 pop 动画
  const bigNum = document.getElementById('bigNum');
  bigNum.textContent = s.num;
  bigNum.classList.remove('pop');
  void bigNum.offsetWidth;
  bigNum.classList.add('pop');
  setTimeout(() => bigNum.classList.remove('pop'), 300);

  // 左侧副标签
  document.getElementById('bigSubLabel').textContent = s.sublabel;

  // slider val + mode badge
  document.getElementById('sliderVal').textContent = s.num;
  const badge = document.getElementById('modeBadge');
  badge.textContent = s.verdictLabel;
  const bc = BADGE_COLORS[s.verdict];
  badge.style.background = bc.bg;
  badge.style.color = bc.text;

  // 规模感受（右上小卡）
  document.getElementById('visAnalogy').innerHTML =
    s.analogy + `<div class="sub">${s.sub}</div>`;
  document.getElementById('scaleBarFill').style.width = s.pct + '%';

  // 图标格
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = '';
  for (let i = 0; i < s.count; i++) {
    const span = document.createElement('span');
    span.className = 'icon-unit';
    span.textContent = s.icon;
    grid.appendChild(span);
    setTimeout(() => span.classList.add('in'), i * 15);
  }

  // 实测大卡（右下）
  const card = document.getElementById('modelCard');
  card.className = 'model-card ' + VERDICT_CLASS[s.verdict];

  document.getElementById('cardSize').textContent    = s.num;
  document.getElementById('cardName').textContent    = s.modelName;
  document.getElementById('cardTag').textContent     = s.modelTag;
  document.getElementById('cardVerdict').textContent = s.verdictLabel;
  document.getElementById('cardAnswer').innerHTML    = s.answer;
  document.getElementById('cardTip').innerHTML       = s.tip;
}

// 初始化
updateScale(0);
document.getElementById('scaleSlider').value = 0;

// ── 下一步 ──
let step = 0;
function nextStep() {
  step++;
  if (step === 1) {
    document.getElementById('insight').classList.add('show');
    document.getElementById('nextBtn').textContent = '完成 ✓';
    document.getElementById('nextBtn').style.background = '#16a34a';
    document.getElementById('nextBtn').onclick = null;
  }
}
</script>
