var curExp = 0, curBadStep = 0, curGoodStep = 0, running = false;

function buildTabs() {
  var html = '';
  for (var i = 0; i < EXPS.length; i++) {
    html += '<button class="exp-tab' + (i === curExp ? ' active' : '') + '" onclick="pickExp(' + i + ')">' + EXPS[i].name + '</button>';
  }
  document.getElementById('expTabs').innerHTML = html;
}

function pickExp(i) {
  curExp = i;
  buildTabs();
  resetExp();
}

function renderToolCard(data, container) {
  var html = '<div class="tool-card"><div class="tc-hd">' +
    '<div class="tc-icon" style="background:' + data.icon_bg + '">' + data.icon + '</div>' +
    '<div class="tc-name">' + data.name + '</div></div>' +
    '<div class="tc-desc" style="background:' + data.descBg + '">' + data.desc + '</div>' +
    '<div class="tc-params">';
  for (var j = 0; j < data.params.length; j++) {
    var p = data.params[j];
    html += '<div class="tc-param"><span class="tc-param-name">' + p.name + '</span><span class="tc-param-type">' + p.type + '</span>' +
      (p.hint ? '<span class="tc-param-hint">' + p.hint + '</span>' : '') + '</div>';
  }
  html += '</div></div>';
  return html;
}

function resetExp() {
  curBadStep = 0;
  curGoodStep = 0;
  running = false;
  var exp = EXPS[curExp];
  var bad = exp.bad, good = exp.good;

  var leftHtml = renderToolCard({icon:bad.card.icon,icon_bg:bad.card.iconBg,name:bad.card.name,desc:bad.card.desc,descBg:bad.card.descBg,params:bad.card.params}, 'leftCol');
  leftHtml += '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-top:2px">用户指令</div>';
  leftHtml += '<div style="background:rgba(8,145,178,.04);border:1px solid rgba(8,145,178,.15);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text)">' + exp.user + '</div>';
  leftHtml += '<div class="sim-area"><div class="sim-hd"><span>模型执行过程</span><span id="badCount">0 / ' + bad.steps.length + '</span></div><div class="sim-body" id="badSim"></div></div>';
  document.getElementById('leftCol').innerHTML = leftHtml;

  var rightHtml = renderToolCard({icon:good.card.icon,icon_bg:good.card.iconBg,name:good.card.name,desc:good.card.desc,descBg:good.card.descBg,params:good.card.params}, 'rightCol');
  rightHtml += '<div style="font-size:12px;font-weight:700;color:var(--muted);margin-top:2px">用户指令</div>';
  rightHtml += '<div style="background:rgba(8,145,178,.04);border:1px solid rgba(8,145,178,.15);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text)">' + exp.user + '</div>';
  rightHtml += '<div class="sim-area"><div class="sim-hd"><span>模型执行过程</span><span id="goodCount">0 / ' + good.steps.length + '</span></div><div class="sim-body" id="goodSim"></div></div>';
  document.getElementById('rightCol').innerHTML = rightHtml;

  document.getElementById('btnRun').disabled = false;
  document.getElementById('btnRun').textContent = '▶ 运行实验';
  document.getElementById('expHint').textContent = '点击运行 → 对比坏描述 vs 好描述的效果差异';
}

function addSimMsg(containerId, step) {
  var el = document.createElement('div');
  el.className = 'sim-msg';
  el.style.background = step.bg;
  el.style.border = '1px solid rgba(0,0,0,.06)';
  el.innerHTML = '<div class="sim-msg-role" style="color:' + step.color + '">' + step.role + '</div>' +
    '<div style="white-space:pre-line">' + step.text + '</div>';
  document.getElementById(containerId).appendChild(el);
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      el.classList.add('show');
      if (step.shake) setTimeout(function() { el.classList.add('shake'); }, 300);
      el.parentElement.scrollTop = el.parentElement.scrollHeight;
    });
  });
}

function runExperiment() {
  if (running) return;
  var exp = EXPS[curExp];
  var bad = exp.bad, good = exp.good;
  var maxSteps = Math.max(bad.steps.length, good.steps.length);

  if (curBadStep >= bad.steps.length && curGoodStep >= good.steps.length) return;

  running = true;
  document.getElementById('btnRun').disabled = true;

  var step = 0;
  function tick() {
    if (step >= maxSteps) {
      running = false;
      document.getElementById('btnRun').textContent = '✓ 实验完成';
      document.getElementById('expHint').textContent = '好描述一次成功 vs 坏描述反复失败——差别只在工具描述的文字质量';
      return;
    }
    if (step < bad.steps.length) {
      addSimMsg('badSim', bad.steps[step]);
      curBadStep = step + 1;
      document.getElementById('badCount').textContent = curBadStep + ' / ' + bad.steps.length;
    }
    if (step < good.steps.length) {
      addSimMsg('goodSim', good.steps[step]);
      curGoodStep = step + 1;
      document.getElementById('goodCount').textContent = curGoodStep + ' / ' + good.steps.length;
    }
    step++;
    setTimeout(tick, 900);
  }
  tick();
}

buildTabs();
resetExp();
</script>
</body>
</html>
