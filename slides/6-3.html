<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>输出格式选择：JSON / Markdown / 纯文本的取舍 | xueai.app</title>
<style>
:root{--bg:#f7f5f0;--text:#1c1c1e;--sub:#6b6b70;--border:rgba(0,0,0,0.07);--surface:white;--surface2:#f0ede6;--purple:#9333ea;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--cyan:#0891b2;--amber:#d97706;--muted:#8e8e93}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e5e2da;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;opacity:0;animation:si .15s ease .08s forwards;-webkit-font-smoothing:antialiased}
@keyframes si{to{opacity:1}}
.slide{width:94vw;max-width:1440px;aspect-ratio:16/9;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.hd{padding:14px 36px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.hd-tag{font-size:14px;font-weight:800;color:var(--purple)}
.hd-title{font-size:24px;font-weight:800;color:var(--text)}
.hd-title em{font-style:normal;color:var(--purple)}
.body{flex:1;display:grid;grid-template-columns:340px 1fr;min-height:0}

/* 左栏 */
.left{padding:14px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:8px;overflow:hidden}
.desc{font-size:15px;color:var(--sub);line-height:1.6;flex-shrink:0}

.fmt-list{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.fmt-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;font-family:inherit;text-align:left;width:100%}
.fmt-btn:hover{border-color:rgba(0,0,0,.15)}
.fmt-btn.active{border-color:var(--purple)}
.badge{padding:3px 9px;border-radius:6px;font-size:12px;font-weight:800;flex-shrink:0;min-width:44px;text-align:center;font-family:monospace}
.ft h4{font-size:15px;font-weight:700;color:var(--text);transition:color .2s}
.fmt-btn.active .ft h4{color:var(--purple)}
.ft p{font-size:12px;color:var(--muted);margin-top:1px}

/* 评分格 */
.score-section{flex-shrink:0}
.score-title{font-size:12px;font-weight:800;color:var(--muted);letter-spacing:.4px;margin-bottom:6px}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px;text-align:center}
.sc .sl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:3px}
.sc .sv{font-size:14px;font-weight:800}
.sv.good{color:var(--green)}.sv.mid{color:var(--amber)}.sv.bad{color:var(--red)}

/* 取舍说明 */
.tradeoff-box{background:rgba(147,51,234,.05);border:1px solid rgba(147,51,234,.15);border-radius:10px;padding:9px 12px;font-size:14px;color:var(--text);line-height:1.6;flex:1;overflow-y:auto}
.tradeoff-box b{color:var(--purple)}
.warn-tag{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:var(--red);padding:1px 7px;border-radius:4px;font-size:12px;font-weight:600}
.good-tag{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);color:var(--green);padding:1px 7px;border-radius:4px;font-size:12px;font-weight:600}

/* 右栏 */
.right{padding:14px 20px;display:flex;flex-direction:column;gap:10px;overflow:hidden}
.demo-hd{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.4px;flex-shrink:0}

/* 流式演示区 */
.stream-area{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:0}
.stream-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
.sp-hd{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.sp-body{flex:1;overflow-y:auto;position:relative}

/* 普通代码视图 */
.code-view{padding:12px 14px;font-size:13px;font-family:'Cascadia Code','Fira Code',monospace;line-height:1.7;color:#cdd6f4;background:#1e1b2e;height:100%;white-space:pre-wrap;word-break:break-word}
/* 渲染视图 */
.render-view{padding:12px 14px;font-size:14px;line-height:1.75;color:var(--text)}

/* token 流动的字符 */
.tk{display:inline;opacity:0;animation:tkIn .08s ease forwards}
@keyframes tkIn{to{opacity:1}}

/* 进度条 */
.prog-row{display:flex;gap:8px;align-items:center;flex-shrink:0}
.prog-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;width:0%;transition:width .2s}
.prog-pct{font-size:12px;color:var(--muted);min-width:32px}

.ctrl-row{display:flex;gap:10px;align-items:center;flex-shrink:0}
.btn{padding:8px 20px;border-radius:9px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-play{background:var(--purple);color:white}
.btn-play:hover{filter:brightness(1.1)}
.btn-play:disabled{opacity:.3;cursor:not-allowed}
.btn-rst{background:var(--surface2);color:var(--sub);border:1px solid var(--border)}
.hint{font-size:13px;color:var(--muted)}

/* syntax highlight */
.k{color:#cba6f7}.s{color:#a6e3a1}.n{color:#fab387}.c{color:#6c7086;font-style:italic}
.tag-r{color:#f38ba8}.attr-r{color:#89dceb}.val-r{color:#a6e3a1}

/* rendered MD styles */
.r-h2{font-size:17px;font-weight:800;color:var(--text);margin:6px 0 4px}
.r-h3{font-size:15px;font-weight:700;color:#5b4fcf;margin:4px 0 2px}
.r-li::before{content:"•";color:var(--purple);margin-right:5px}
.r-li{padding-left:10px;margin:2px 0;font-size:14px}
.r-bq{border-left:3px solid #cba6f7;padding-left:10px;color:var(--sub);font-style:italic;margin:4px 0;font-size:13px}
.r-strong{font-weight:800;color:var(--text)}

/* streaming status badge */
.status{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.status.live{background:#fef3c7;color:#92400e;animation:pulse 1.2s ease infinite}
.status.done{background:#d1fae5;color:#065f46}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>

<script>
const FMTS = [
  {
    demoHd: '演示：纯文本 — 流式 Token 体验',
    rawTitle: '原始 Token 流',
    rendTitle: '前端实时呈现（可直接显示）',
    scores: [
      {lbl:'前端处理',val:'直接',cls:'good'},{lbl:'Token量',val:'最少',cls:'good'},
      {lbl:'结构解析',val:'难',cls:'bad'},{lbl:'流式体验',val:'✓✓',cls:'good'}
    ],
    tradeoff: `<b>纯文本适用：</b>直接展示给用户 / 不需要程序读取字段 / 超长内容输出<br><br>
<span class="good-tag">优点</span> Token 最省，流式生成即时显示，无需等待全文<br>
<span class="good-tag">优点</span> 不会因括号缺失而解析失败<br>
<span class="warn-tag">缺点</span> 结构信息提取困难，不适合程序消费`,
    raw: 'Notion AI\n类型：写作辅助\n亮点：无缝集成 Notion\n适合：内容团队\n\nMidjourney\n类型：图像生成\n亮点：艺术风格丰富\n适合：设计师',
    renderFn: (raw) => `<div style="white-space:pre-wrap;font-size:14px;font-family:monospace;color:var(--sub)">${escHtml(raw)}</div>`
  },
  {
    demoHd: '演示：JSON — 流式时"残缺"无法解析',
    rawTitle: '原始 Token 流（JSON 未完成前…）',
    rendTitle: '前端只能等全文才能解析',
    scores: [
      {lbl:'前端处理',val:'✓',cls:'good'},{lbl:'Token量',val:'中等',cls:'mid'},
      {lbl:'结构解析',val:'✓✓',cls:'good'},{lbl:'流式体验',val:'差',cls:'bad'}
    ],
    tradeoff: `<b>JSON 适用：</b>后端读取字段 / 数据入库 / 前端动态渲染（非流式）<br><br>
<span class="good-tag">优点</span> JSON.parse() 字段精准，前端渲染方便<br>
<span class="warn-tag">缺点</span> 流式时 JSON 是残缺的——必须等全文到达才能 parse<br>
<span class="warn-tag">缺点</span> 超长 JSON 括号缺失容易生成失败，必须加兜底逻辑`,
    raw: '{\n  "tools": [\n    {\n      "name": "Notion AI",\n      "type": "写作辅助",\n      "highlight": "无缝集成 Notion"\n    },\n    {\n      "name": "Midjourney",\n      "type": "图像生成"\n    }\n  ]\n}',
    renderFn: (raw, pct) => {
      if (pct < 100) {
        return `<div style="padding:20px;text-align:center;color:var(--amber)">
          <div style="font-size:32px;margin-bottom:8px">⏳</div>
          <div style="font-size:15px;font-weight:700">等待 JSON 全文到达……</div>
          <div style="font-size:13px;color:var(--muted);margin-top:6px">流式时 JSON 残缺无法 parse，用户看到空白</div>
        </div>`;
      }
      return `<div style="padding:12px;font-size:14px">
        <div style="color:var(--green);font-weight:700;margin-bottom:8px">✅ JSON 接收完毕，开始解析……</div>
        <div style="background:var(--surface2);border-radius:6px;padding:8px 10px;font-size:13px;font-family:monospace">
          name: <b>Notion AI</b> | type: 写作辅助<br>
          name: <b>Midjourney</b> | type: 图像生成
        </div>
      </div>`;
    }
  },
  {
    demoHd: '演示：Markdown — 流式可渲染，字符逐步出现',
    rawTitle: '原始 Token 流（Markdown 语法）',
    rendTitle: '前端实时渲染（逐步成形）',
    scores: [
      {lbl:'前端处理',val:'✓✓',cls:'good'},{lbl:'Token量',val:'中等',cls:'mid'},
      {lbl:'结构解析',val:'难',cls:'bad'},{lbl:'流式体验',val:'✓',cls:'good'}
    ],
    tradeoff: `<b>Markdown 适用：</b>直接渲染给用户看 / 文档类输出 / 聊天界面<br><br>
<span class="good-tag">优点</span> 渲染后格式美观，标题/加粗/列表开箱即用，流式显示自然<br>
<span class="warn-tag">缺点</span> 格式化提取极难，不适合程序消费<br>
<span class="warn-tag">缺点</span> 不同模型 Markdown 风格不一致（* 和 - 混用）`,
    raw: '## AI 工具推荐\n\n### 1. Notion AI\n- **类型**：写作辅助\n- **亮点**：无缝集成 Notion\n- **适合**：内容团队\n\n### 2. Midjourney\n- **类型**：图像生成\n- **亮点**：艺术风格丰富\n\n> 以上工具均支持免费试用',
    renderFn: (raw) => mdRender(raw)
  },
  {
    demoHd: '演示：YAML — Token 最省，流式同样残缺',
    rawTitle: '原始 Token 流（YAML 格式）',
    rendTitle: '前端只能等全文才能 parse',
    scores: [
      {lbl:'前端处理',val:'后端',cls:'mid'},{lbl:'Token量',val:'最省',cls:'good'},
      {lbl:'结构解析',val:'✓',cls:'good'},{lbl:'流式体验',val:'一般',cls:'mid'}
    ],
    tradeoff: `<b>YAML 适用：</b>后端处理 / 配置文件生成 / 不需要前端感知的数据流<br><br>
<span class="good-tag">优点</span> 比 JSON 省 15-30% Token（无引号/括号开销），解析同样精准<br>
<span class="good-tag">优点</span> 人类可读性好，适合生成配置文件<br>
<span class="warn-tag">缺点</span> 流式时同样残缺，缩进错误会导致解析失败`,
    raw: 'tools:\n  - name: Notion AI\n    type: 写作辅助\n    highlight: 无缝集成 Notion\n    suitable_for: 内容团队\n\n  - name: Midjourney\n    type: 图像生成\n    highlight: 艺术风格丰富\n    suitable_for: 设计师',
    renderFn: (raw, pct) => {
      if (pct < 100) {
        return `<div style="padding:20px;text-align:center;color:var(--amber)">
          <div style="font-size:32px;margin-bottom:8px">⏳</div>
          <div style="font-size:15px;font-weight:700">等待 YAML 全文……</div>
          <div style="font-size:13px;color:var(--muted);margin-top:6px">缩进结构未完成时无法 parse</div>
        </div>`;
      }
      return `<div style="padding:12px;font-size:14px">
        <div style="color:var(--green);font-weight:700;margin-bottom:8px">✅ YAML 完整，开始 parse……</div>
        <div style="background:var(--surface2);border-radius:6px;padding:8px 10px;font-size:13px;font-family:monospace">
          tools[0].name = Notion AI<br>tools[1].name = Midjourney
        </div>
        <div style="color:var(--muted);font-size:13px;margin-top:6px">比 JSON 节省约 20% Token ✓</div>
      </div>`;
    }
  },
  {
    demoHd: '演示：XML — 流式可增量解析，每个标签闭合即可用',
    rawTitle: '原始 Token 流（XML 自定义标签）',
    rendTitle: '前端增量解析：标签闭合即渲染',
    scores: [
      {lbl:'前端处理',val:'✓✓',cls:'good'},{lbl:'Token量',val:'较多',cls:'bad'},
      {lbl:'Tool调用',val:'✓✓',cls:'good'},{lbl:'流式体验',val:'✓✓',cls:'good'}
    ],
    tradeoff: `<b>XML 适用：</b>Tool 调用 / 流式渲染 / Claude 推荐格式<br><br>
<span class="good-tag">优点</span> 流式时可增量解析——每捕获到 &lt;/name&gt; 就立刻渲染，无需等全文<br>
<span class="good-tag">优点</span> Tool 调用结构天然匹配 XML，Anthropic Claude 原生偏好<br>
<span class="warn-tag">缺点</span> Token 消耗最高（标签本身占 Token）`,
    raw: '<tool_list>\n  <tool>\n    <name>Notion AI</name>\n    <type>写作辅助</type>\n    <highlight>无缝集成 Notion</highlight>\n  </tool>\n  <tool>\n    <name>Midjourney</name>\n    <type>图像生成</type>\n    <highlight>艺术风格丰富</highlight>\n  </tool>\n</tool_list>',
    renderFn: (raw) => xmlRender(raw)
  }
];

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function mdRender(raw) {
  let html = escHtml(raw);
  html = html.replace(/^## (.+)$/gm, '<div class="r-h2">$1</div>');
  html = html.replace(/^### (.+)$/gm, '<div class="r-h3">$1</div>');
  html = html.replace(/^\- \*\*(.+?)\*\*：(.+)$/gm, '<div class="r-li"><span class="r-strong">$1</span>：$2</div>');
  html = html.replace(/^\- (.+)$/gm, '<div class="r-li">$1</div>');
  html = html.replace(/^&gt; (.+)$/gm, '<div class="r-bq">$1</div>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<span class="r-strong">$1</span>');
  html = html.replace(/\n/g, '');
  return `<div style="padding:10px 14px">${html}</div>`;
}

function xmlRender(raw) {
  const matches = [...raw.matchAll(/<tool>([\s\S]*?)<\/tool>/g)];
  if (!matches.length) return `<div style="padding:12px;color:var(--muted);font-size:13px">等待第一个 &lt;/tool&gt; 闭合标签……</div>`;
  let html = '<div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">';
  matches.forEach((m, i) => {
    const name = (m[1].match(/<name>(.*?)<\/name>/) || ['','?'])[1];
    const type = (m[1].match(/<type>(.*?)<\/type>/) || ['',''])[1];
    const hl   = (m[1].match(/<highlight>(.*?)<\/highlight>/) || ['',''])[1];
    html += `<div style="background:var(--surface2);border-radius:8px;padding:8px 12px;font-size:14px">
      <div style="font-weight:800;color:var(--purple);margin-bottom:3px">${escHtml(name)}</div>
      ${type?`<div style="color:var(--sub);font-size:13px">类型：${escHtml(type)}</div>`:''}
      ${hl?`<div style="color:var(--green);font-size:13px;margin-top:2px">✓ ${escHtml(hl)}</div>`:''}
    </div>`;
  });
  html += `<div style="color:var(--green);font-size:12px;margin-top:2px">↑ 已解析 ${matches.length} 个条目（流式进行中…）</div>`;
  html += '</div>';
  return html;
}

let curFmt = 0, playing = false, rawTimer = null;

function pickFmt(btn, idx) {
  document.querySelectorAll('.fmt-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  curFmt = idx;
  resetDemo();
  const f = FMTS[idx];
  document.getElementById('demoHd').textContent = f.demoHd;
  document.getElementById('rawTitle').textContent = f.rawTitle;
  document.getElementById('rendTitle').textContent = f.rendTitle;
  document.getElementById('scoreGrid').innerHTML = f.scores.map(s =>
    `<div class="sc"><div class="sl">${s.lbl}</div><div class="sv ${s.cls}">${s.val}</div></div>`
  ).join('');
  document.getElementById('tradeoffBox').innerHTML = f.tradeoff;
}

function playDemo() {
  if (playing) return;
  playing = true;
  document.getElementById('btnPlay').disabled = true;
  document.getElementById('playHint').textContent = '流式 Token 生成中……';
  document.getElementById('rawStatus').textContent = '生成中';
  document.getElementById('rawStatus').className = 'status live';
  document.getElementById('rendStatus').textContent = '渲染中';
  document.getElementById('rendStatus').className = 'status live';

  const f = FMTS[curFmt];
  const rawEl = document.getElementById('rawView');
  const rendEl = document.getElementById('rendView');
  const prog = document.getElementById('progFill');
  const progPct = document.getElementById('progPct');
  rawEl.innerHTML = '';

  const chars = f.raw.split('');
  let i = 0, raw = '';

  function tick() {
    if (i >= chars.length) {
      document.getElementById('rawStatus').textContent = '完成';
      document.getElementById('rawStatus').className = 'status done';
      document.getElementById('rendStatus').textContent = '完成';
      document.getElementById('rendStatus').className = 'status done';
      playing = false;
      document.getElementById('playHint').textContent = '流式演示完成 — 观察两侧体验差异';
      rendEl.innerHTML = f.renderFn(raw, 100);
      prog.style.width = '100%'; progPct.textContent = '100%';
      return;
    }
    const ch = chars[i++];
    raw += ch;
    // 原始流着色
    const span = document.createElement('span');
    span.className = 'tk';
    if (ch === '<') span.style.color='#f38ba8';
    else if (ch === '>') span.style.color='#f38ba8';
    else if (ch === '"') span.style.color='#a6e3a1';
    else if (ch === ':') span.style.color='#89dceb';
    else span.style.color='#cdd6f4';
    span.textContent = ch;
    rawEl.appendChild(span);
    rawEl.scrollTop = rawEl.scrollHeight;

    const pct = Math.round(i / chars.length * 100);
    prog.style.width = pct + '%'; progPct.textContent = pct + '%';

    // 右侧渲染（每 5 个字符刷新一次）
    if (i % 5 === 0 || i === chars.length) {
      rendEl.innerHTML = f.renderFn(raw, pct);
      document.getElementById('rendBody').scrollTop = 9999;
    }

    const delay = ch === '\n' ? 60 : 18;
    rawTimer = setTimeout(tick, delay);
  }
  tick();
}

function resetDemo() {
  clearTimeout(rawTimer);
  playing = false;
  document.getElementById('rawView').innerHTML = '';
  document.getElementById('rendView').innerHTML = `<div style="padding:16px;color:var(--muted);font-size:14px">点击"开始流式演示"查看效果……</div>`;
  document.getElementById('btnPlay').disabled = false;
  document.getElementById('btnPlay').textContent = '▶ 开始流式演示';
  document.getElementById('playHint').textContent = '';
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('progPct').textContent = '0%';
  document.getElementById('rawStatus').textContent = '等待';
  document.getElementById('rawStatus').className = 'status live';
  document.getElementById('rendStatus').textContent = '等待';
  document.getElementById('rendStatus').className = 'status live';
}

// 初始化
pickFmt(document.querySelector('.fmt-btn.active'), 0);
</script>
